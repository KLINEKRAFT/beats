function maybeShowHint() {
  const tr = state.tracks[state.trackIdx];
  if (state.mode === 'scenes' && !state.hintsSeen.scenes) {
    showHint('each cell is a pattern. tap to switch live. long-press to edit.', 'scenes');
    return;
  }
  if (tr.type === 'melodic' && !state.hintsSeen.melodic) {
    showHint('melodic pads are scale notes. tap the preset name to swap synth.', 'melodic');
    return;
  }
  if (state.mode === 'pads' && !state.hintsSeen.pads) {
    showHint('tap a track. each track plays its own pattern. all 4 layer together.', 'pads');
    return;
  }
  if (state.mode === 'seq' && !state.hintsSeen.seq) {
    showHint('tap a step to add it. long-press to set velocity.', 'seq');
    return;
  }
}
setTimeout(maybeShowHint, 2000);

/* ============================================================
   TOAST
============================================================ */
const toastEl = document.getElementById('toast');
let toastTimer = null;
function showToast(text) {
  toastEl.textContent = text;
  toastEl.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1100);
}

/* ============================================================
   TRANSPORT + SCHEDULER
============================================================ */
const playBtn = document.getElementById('playBtn');
const playIcon = document.getElementById('playIcon');
const playhead = document.getElementById('playhead');

const LOOKAHEAD_MS = 25;
const SCHEDULE_AHEAD_S = 0.10;

let nextStepTime = 0;
let scheduledStep = 0;
let schedulerTimer = null;
const recentTriggers = [];

function stepDuration() { return (60 / state.bpm) / 4; }

function applyPendingScenesIfWrap(step) {
  if (step !== 0) return;
  for (let t = 0; t < NUM_TRACKS; t++) {
    if (state.pendingScene[t] !== null) {
      state.trackPlayScene[t] = state.pendingScene[t];
      state.pendingScene[t] = null;
    }
  }
}

function scheduleStep(step, time) {
  applyPendingScenesIfWrap(step);
  for (let t = 0; t < NUM_TRACKS; t++) {
    const scenePat = state.patterns[t][state.trackPlayScene[t]];
    for (let p = 0; p < NUM_PADS; p++) {
      const v = scenePat[p][step];
      if (v > 0) playSound(t, p, time, v);
    }
  }
  recentTriggers.push({ step, audioTime: time });
}
function schedulerTick() {
  while (nextStepTime < audioCtx.currentTime + SCHEDULE_AHEAD_S) {
    scheduleStep(scheduledStep, nextStepTime);
    nextStepTime += stepDuration();
    scheduledStep = (scheduledStep + 1) % NUM_STEPS;
  }
}
function visualTick() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  while (recentTriggers.length && recentTriggers[0].audioTime <= now) {
    const tr = recentTriggers.shift();
    state.currentStep = tr.step;
    const w = veloEl.clientWidth;
    playhead.style.left = (state.currentStep * (w / NUM_STEPS)) + 'px';
    if (state.mode === 'seq') {
      pads.forEach((p,i) => p.classList.toggle('step-current', i === state.currentStep));
    }
    if (state.mode === 'scenes' && tr.step === 0) {
      applyMode();
      rebuildVelocityStrip();
    }
  }
  if (state.playing) requestAnimationFrame(visualTick);
}
function setPlayIcon(on){
  playBtn.classList.toggle('playing', on);
  playIcon.innerHTML = on
    ? '<rect x="6" y="5" width="5" height="14"/><rect x="13" y="5" width="5" height="14"/>'
    : '<path d="M7 5 L19 12 L7 19 Z"/>';
}

let wakeLock = null;
async function requestWakeLock() {
  try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch(_){}
}
function releaseWakeLock() { if (wakeLock) { wakeLock.release().catch(()=>{}); wakeLock = null; } }
document.addEventListener('visibilitychange', () => {
  if (state.playing && document.visibilityState === 'visible') requestWakeLock();
});

function startLoop(){
  ensureAudio();
  state.playing = true;
  setPlayIcon(true);
  scheduledStep = 0;
  state.currentStep = 0;
  recentTriggers.length = 0;
  nextStepTime = audioCtx.currentTime + 0.05;
  schedulerTimer = setInterval(schedulerTick, LOOKAHEAD_MS);
  requestAnimationFrame(visualTick);
  requestWakeLock();
}
function stopLoop(){
  state.playing = false;
  setPlayIcon(false);
  if (schedulerTimer) clearInterval(schedulerTimer);
  schedulerTimer = null;
  recentTriggers.length = 0;
  state.currentStep = 0;
  playhead.style.left = '0px';
  applyMode();
  releaseWakeLock();
}
playBtn.addEventListener('pointerdown', () => {
  if (state.playing) stopLoop(); else startLoop();
});

const bpmEl = document.getElementById('bpmDisplay');
bpmEl.textContent = state.bpm + ' bpm';
bpmEl.addEventListener('pointerdown', () => {
  const idx = state.bpmCycle.indexOf(state.bpm);
  state.bpm = state.bpmCycle[(idx+1) % state.bpmCycle.length];
  bpmEl.textContent = state.bpm + ' bpm';
  applyKnobsToAudio();
  saveState();
});

/* ============================================================
   CLEAR BUTTON
============================================================ */
const clearBtn = document.getElementById('clearBtn');
let clearPressTimer = null;
let clearLongHandled = false;
clearBtn.addEventListener('pointerdown', () => {
  clearLongHandled = false;
  clearPressTimer = setTimeout(() => {
    clearLongHandled = true;
    for (let t = 0; t < NUM_TRACKS; t++)
      for (let s = 0; s < NUM_SCENES; s++)
        for (let p = 0; p < NUM_PADS; p++)
          state.patterns[t][s][p].fill(0);
    applyMode();
    rebuildVelocityStrip();
    saveState();
    showToast('all cleared');
    if (window.navigator.vibrate) window.navigator.vibrate([20, 40, 20]);
  }, CLEAR_LONG_MS);
});
clearBtn.addEventListener('pointerup', () => {
  if (clearPressTimer) { clearTimeout(clearPressTimer); clearPressTimer = null; }
  if (clearLongHandled) return;
  if (state.mode === 'seq') {
    activeScenePat()[state.selectedPad].fill(0);
  } else if (state.mode === 'scenes') {
    const f = state.scenesFocus;
    for (let p = 0; p < NUM_PADS; p++) state.patterns[f.track][f.scene][p].fill(0);
  } else {
    for (let p = 0; p < NUM_PADS; p++) activeScenePat()[p].fill(0);
  }
  applyMode();
  rebuildVelocityStrip();
  saveState();
  if (window.navigator.vibrate) window.navigator.vibrate(12);
});
clearBtn.addEventListener('pointercancel', () => {
  if (clearPressTimer) { clearTimeout(clearPressTimer); clearPressTimer = null; }
});

/* ============================================================
   SELECTED-SOUND FOOTER
============================================================ */
function updateSelectedSound(){
  const tr = state.tracks[state.trackIdx];
  const num = String(state.selectedPad+1).padStart(2,'0');
  const el = document.getElementById('selSound');
  if (tr.type === 'drums') {
    el.textContent = `${tr.name} ${num} / ${DRUM_KIT[state.selectedPad].n}`;
  } else {
    const preset = PRESET_BY_ID.get(tr.presetId);
    const presetName = preset ? preset.n : '—';
    el.textContent = `${tr.name} · ${presetName} / ${padLabel(tr, state.selectedPad)}`;
  }
}
updateSelectedSound();

/* ============================================================
   LIBRARY DRAWER
============================================================ */
const drawer = document.getElementById('drawer');
const drawerBackdrop = document.getElementById('drawerBackdrop');
const drawerList = document.getElementById('drawerList');
const saveAction = document.getElementById('saveAction');
const saveRow = document.getElementById('saveRow');
const saveName = document.getElementById('saveName');
const saveConfirm = document.getElementById('saveConfirm');
const kitNameEl = document.getElementById('kitName');
const presetDrawer = document.getElementById('presetDrawer');
const trackSettingsDrawer = document.getElementById('trackSettingsDrawer');

function openDrawer() {
  closeAllDrawers();
  renderLibrary();
  drawer.classList.add('open');
  drawerBackdrop.classList.add('open');
}
function closeAllDrawers() {
  drawer.classList.remove('open');
  presetDrawer.classList.remove('open');
  trackSettingsDrawer.classList.remove('open');
  drawerBackdrop.classList.remove('open');
  saveRow.classList.remove('show');
  saveName.value = '';
}
function renderLibrary() {
  const lib = getLibrary();
  drawerList.innerHTML = '';
  if (!lib.length) {
    const empty = document.createElement('div');
    empty.className = 'lib-item empty';
    empty.textContent = 'no saved patterns yet';
    drawerList.appendChild(empty);
    return;
  }
  lib.sort((a,b) => b.savedAt - a.savedAt);
  lib.forEach(snap => {
    const row = document.createElement('div');
    row.className = 'lib-item';
    row.innerHTML = `
      <div class="lib-name"></div>
      <div class="lib-meta">${snap.bpm} bpm</div>
      <div class="lib-del">delete</div>
    `;
    row.querySelector('.lib-name').textContent = snap.name;
    row.addEventListener('pointerdown', (e) => {
      if (e.target.classList.contains('lib-del')) return;
      loadFromSnapshot(snap);
      closeAllDrawers();
    });
    row.querySelector('.lib-del').addEventListener('pointerdown', (e) => {
      e.stopPropagation();
      const newLib = getLibrary().filter(s => s.id !== snap.id);
      setLibrary(newLib);
      renderLibrary();
    });
    drawerList.appendChild(row);
  });
}
kitNameEl.addEventListener('pointerdown', openDrawer);
drawerBackdrop.addEventListener('pointerdown', closeAllDrawers);
saveAction.addEventListener('pointerdown', () => {
  saveRow.classList.add('show');
  setTimeout(() => saveName.focus(), 100);
});
saveConfirm.addEventListener('pointerdown', () => {
  const name = saveName.value.trim() || ('pattern ' + new Date().toLocaleDateString());
  const lib = getLibrary();
  lib.push(snapshotCurrent(name));
  setLibrary(lib);
  saveRow.classList.remove('show');
  saveName.value = '';
  renderLibrary();
});
saveName.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') saveConfirm.dispatchEvent(new Event('pointerdown'));
});

/* ============================================================
   PRESET PICKER DRAWER
============================================================ */
const presetList = document.getElementById('presetList');
const presetDone = document.getElementById('presetDone');
const presetReset = document.getElementById('presetReset');
const presetDrawerTitle = document.getElementById('presetDrawerTitle');

function openPresetPicker() {
  const tr = state.tracks[state.trackIdx];
  if (tr.type !== 'melodic') return;
  closeAllDrawers();
  presetDrawerTitle.textContent = `${tr.name} · presets`;
  renderPresetList();
  presetDrawer.classList.add('open');
  drawerBackdrop.classList.add('open');
  if (!state.hintsSeen.presets) {
    state.hintsSeen.presets = true;
    saveState();
  }
}
function renderPresetList() {
  const tr = state.tracks[state.trackIdx];
  presetList.innerHTML = '';
  let lastFam = null;
  PRESETS.forEach(p => {
    if (p.fam !== lastFam) {
      const sec = document.createElement('div');
      sec.className = 'preset-section-label';
      sec.textContent = p.fam;
      presetList.appendChild(sec);
      lastFam = p.fam;
    }
    const row = document.createElement('div');
    row.className = 'preset-item' + (tr.presetId === p.id ? ' active' : '');
    row.innerHTML = `<div class="preset-name"></div><div class="preset-fam">${p.fam}</div>`;
    row.querySelector('.preset-name').textContent = p.n;
    row.addEventListener('pointerdown', () => {
      tr.presetId = p.id;
      state.trackParams[state.trackIdx] = {};
      renderPresetList();
      buildKnobs();
      updateChipRow();
      updateSelectedSound();
      saveState();
    });
    presetList.appendChild(row);
  });
}
presetDone.addEventListener('pointerdown', closeAllDrawers);
presetReset.addEventListener('pointerdown', () => {
  state.trackParams[state.trackIdx] = {};
  buildKnobs();
  saveState();
  showToast('reset');
});

/* ============================================================
   TRACK SETTINGS DRAWER
============================================================ */
const tsBody = document.getElementById('tsBody');
const tsTitle = document.getElementById('tsTitle');
const tsDone = document.getElementById('tsDone');

function openTrackSettings(idx) {
  closeAllDrawers();
  const tr = state.tracks[idx];
  tsTitle.textContent = tr.name + ' · settings';
  renderTrackSettings(idx);
  trackSettingsDrawer.classList.add('open');
  drawerBackdrop.classList.add('open');
}

function renderTrackSettings(idx) {
  const tr = state.tracks[idx];
  tsBody.innerHTML = '';

  // Name
  const nameSec = document.createElement('div');
  nameSec.className = 'ts-section ts-name';
  nameSec.innerHTML = `<div class="ts-label">name</div><input type="text" maxlength="14"/>`;
  const nameInput = nameSec.querySelector('input');
  nameInput.value = tr.name;
  nameInput.addEventListener('input', () => {
    tr.name = nameInput.value.trim() || tr.name;
    updateTrackUI();
    updateChipRow();
    updateSelectedSound();
    saveState();
  });
  tsBody.appendChild(nameSec);

  if (tr.type !== 'melodic') return;

  // Key
  const keySec = document.createElement('div');
  keySec.className = 'ts-section';
  keySec.innerHTML = `<div class="ts-label">key</div><div class="chip-grid"></div>`;
  const keyGrid = keySec.querySelector('.chip-grid');
  KEYS.forEach((k, i) => {
    const c = document.createElement('div');
    c.className = 'chip' + (i === tr.key ? ' active' : '');
    c.textContent = k;
    c.addEventListener('pointerdown', () => {
      tr.key = i;
      keyGrid.querySelectorAll('.chip').forEach((x, xi) => x.classList.toggle('active', xi === i));
      applyMode();
      updateChipRow();
      updateSelectedSound();
      saveState();
    });
    keyGrid.appendChild(c);
  });
  tsBody.appendChild(keySec);

  // Scale
  const scaleSec = document.createElement('div');
  scaleSec.className = 'ts-section';
  scaleSec.innerHTML = `<div class="ts-label">scale</div><div class="chip-grid"></div>`;
  const scaleGrid = scaleSec.querySelector('.chip-grid');
  SCALE_NAMES.forEach(name => {
    const c = document.createElement('div');
    c.className = 'chip' + (name === tr.scale ? ' active' : '');
    c.textContent = name;
    c.addEventListener('pointerdown', () => {
      tr.scale = name;
      scaleGrid.querySelectorAll('.chip').forEach(x => x.classList.toggle('active', x.textContent === name));
      applyMode();
      updateChipRow();
      updateSelectedSound();
      saveState();
    });
    scaleGrid.appendChild(c);
  });
  tsBody.appendChild(scaleSec);

  // Octave
  const octSec = document.createElement('div');
  octSec.className = 'ts-section';
  octSec.innerHTML = `<div class="ts-label">octave</div>
    <div class="oct-stepper">
      <div class="step-btn" data-d="-1">−</div>
      <div class="oct-val"></div>
      <div class="step-btn" data-d="1">+</div>
    </div>`;
  const octVal = octSec.querySelector('.oct-val');
  octVal.textContent = tr.octave;
  octSec.querySelectorAll('.step-btn').forEach(b => {
    b.addEventListener('pointerdown', () => {
      const d = +b.dataset.d;
      tr.octave = Math.max(0, Math.min(6, tr.octave + d));
      octVal.textContent = tr.octave;
      applyMode();
      updateChipRow();
      updateSelectedSound();
      saveState();
    });
  });
  tsBody.appendChild(octSec);
}
tsDone.addEventListener('pointerdown', closeAllDrawers);

/* ============================================================
   INTRO ANIMATION
============================================================ */
const introEl = document.getElementById('intro');
const introLine = document.getElementById('introLine');
const introMark = document.getElementById('introMark');

let introDone = false;
function finishIntro() {
  if (introDone) return;
  introDone = true;
  introEl.classList.add('fade');
  setTimeout(() => { introEl.style.display = 'none'; }, 500);
}
introEl.addEventListener('pointerdown', finishIntro);

function runIntro() {
  setTimeout(() => introLine.classList.add('draw'), 50);
  setTimeout(() => introMark.classList.add('show'), 470);
  setTimeout(() => introLine.classList.add('shrink'), 920);
  setTimeout(finishIntro, 1450);
}
runIntro();

/* ============================================================
   INIT
============================================================ */
buildKnobs();
applyMode();
updateChipRow();
updateSelectedSound();
</script>
