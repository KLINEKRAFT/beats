<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#dbd7d3">
<title>klinekraft beat</title>
<style>
  :root {
    --bone: #dbd7d3;
    --bone-deep: #c9c4be;
    --pad: #c2bdb6;
    --pad-pressed: #b3aea6;
    --pad-selected: #a8a39b;
    --ink: #1a1a1a;
    --ink-soft: #5a5752;
    --hairline: #b0aba3;
    --accent: #ed3f1c;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bone); color: var(--ink);
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    user-select: none; -webkit-user-select: none;
    overscroll-behavior: none;
  }
  body {
    min-height: 100vh; min-height: 100dvh;
    display: flex; justify-content: center;
    background: radial-gradient(ellipse at top, #cfcac3 0%, #b8b3ac 100%);
  }
  .device {
    width: 100%; max-width: 393px;
    min-height: 100vh; min-height: 100dvh;
    background: var(--bone);
    display: flex; flex-direction: column; position: relative;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    overflow: hidden;
  }

  .topbar {
    height: 52px; flex-shrink: 0;
    display: grid; grid-template-columns: 52px 1fr 72px;
    align-items: center; padding: 0 16px;
    border-bottom: 1px solid var(--hairline);
  }
  .back { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }
  .back svg { width: 16px; height: 16px; stroke: var(--ink-soft); }
  .kit-name { text-align: center; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; }
  .bpm { text-align: right; font-size: 11px; letter-spacing: 0.12em; color: var(--ink-soft); font-variant-numeric: tabular-nums; cursor: pointer; }

  .tabs { display: grid; grid-template-columns: repeat(4, 1fr); height: 44px; border-bottom: 1px solid var(--hairline); flex-shrink: 0; }
  .tab { display: flex; align-items: center; justify-content: center; font-size: 11px; letter-spacing: 0.08em; color: var(--ink-soft); position: relative; cursor: pointer; }
  .tab.active { color: var(--ink); }
  .tab.active::after { content: ""; position: absolute; left: 50%; bottom: -1px; transform: translateX(-50%); width: 28px; height: 2px; background: var(--accent); }
  .tab.disabled { opacity: 0.35; }

  .knobs { padding: 18px 16px 14px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px 8px; flex-shrink: 0; }
  .knob-cell { display: flex; flex-direction: column; align-items: center; gap: 6px; position: relative; }
  .knob-label { font-size: 9px; letter-spacing: 0.12em; text-transform: lowercase; color: var(--ink-soft); }
  .knob { width: 52px; height: 52px; position: relative; touch-action: none; cursor: ns-resize; }
  .knob svg { width: 100%; height: 100%; display: block; pointer-events: none; }
  .knob .track { fill: none; stroke: var(--bone-deep); stroke-width: 2; }
  .knob .arc { fill: none; stroke: var(--accent); stroke-width: 2; }
  .knob .tick { stroke: var(--ink); stroke-width: 1.4; }
  .knob-value { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--ink); opacity: 0; pointer-events: none; font-variant-numeric: tabular-nums; transition: opacity 0.18s ease; }
  .knob.editing .knob-value { opacity: 1; }
  .knob.editing { cursor: grabbing; }

  .velocity { height: 28px; margin: 4px 16px 8px; border-top: 1px solid var(--hairline); border-bottom: 1px solid var(--hairline); display: flex; align-items: flex-end; justify-content: space-between; padding: 4px 0; position: relative; overflow: hidden; flex-shrink: 0; }
  .vel-bar { width: 2px; background: var(--accent); opacity: 0.78; transition: height 0.06s ease; }
  .playhead { position: absolute; top: 0; bottom: 0; width: 1px; background: var(--ink); opacity: 0.5; left: 0; pointer-events: none; }

  .pads { flex: 1; padding: 4px 16px 8px; display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); gap: 6px; min-height: 320px; }
  .pad {
    background: var(--pad); border-radius: 3px; position: relative; cursor: pointer;
    transition: background 0.06s ease, transform 0.06s ease;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.25), inset 0 -1px 0 rgba(0,0,0,0.06);
    display: flex; align-items: flex-start; justify-content: flex-start; padding: 8px;
    touch-action: none;
  }
  .pad.flash { background: var(--accent); transform: scale(0.985); }
  .pad.selected { background: var(--pad-selected); }
  .pad-label { font-size: 8px; letter-spacing: 0.1em; text-transform: lowercase; color: var(--ink-soft); pointer-events: none; }
  .pad.flash .pad-label { color: rgba(255,255,255,0.9); }
  .pad .step-dot { position: absolute; bottom: 7px; right: 7px; width: 7px; height: 7px; background: var(--accent); opacity: 0; transition: opacity 0.1s ease; }
  .pad.has-step .step-dot { opacity: 1; }
  .step-num { font-size: 9px; letter-spacing: 0.06em; color: var(--ink-soft); font-variant-numeric: tabular-nums; pointer-events: none; display: none; }

  .pad.step-mode { padding: 0; align-items: center; justify-content: center; }
  .pad.step-mode .pad-label { display: none; }
  .pad.step-mode .step-dot { display: none; }
  .pad.step-mode .step-num { display: block; }
  .pad.step-mode.step-on { background: var(--accent); }
  .pad.step-mode.step-on .step-num { color: rgba(255,255,255,0.9); }
  .pad.step-mode.step-current { box-shadow: inset 0 0 0 2px var(--ink), inset 0 1px 0 rgba(255,255,255,0.25); }

  .transport { height: 52px; flex-shrink: 0; display: grid; grid-template-columns: repeat(6, 1fr); align-items: center; padding: 0 16px; border-top: 1px solid var(--hairline); }
  .ctrl { display: flex; align-items: center; justify-content: center; height: 100%; cursor: pointer; }
  .ctrl svg { width: 18px; height: 18px; stroke: var(--ink-soft); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
  .ctrl.play svg { fill: var(--ink-soft); stroke: var(--ink-soft); }
  .ctrl.play.playing svg { fill: var(--accent); stroke: var(--accent); }

  .footer-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px 12px; }
  .selected-sound { font-size: 9px; letter-spacing: 0.18em; text-transform: lowercase; color: var(--ink-soft); font-variant-numeric: tabular-nums; }
  .signature { font-size: 9px; letter-spacing: 0.22em; text-transform: lowercase; color: var(--ink); opacity: 0.32; }
</style>
</head>
<body>
  <div class="device">
    <div class="topbar">
      <div class="back"><svg viewBox="0 0 16 16" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 3 L5 8 L10 13"/></svg></div>
      <div class="kit-name">studio 01</div>
      <div class="bpm" id="bpmDisplay">92 bpm</div>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="pads">pads</div>
      <div class="tab" data-tab="seq">seq</div>
      <div class="tab disabled" data-tab="padfx">pad fx</div>
      <div class="tab disabled" data-tab="kitfx">kit fx</div>
    </div>

    <div class="knobs">
      <div class="knob-cell"><div class="knob-label">filter freq</div><div class="knob" data-param="filterFreq" data-value="0.62"></div></div>
      <div class="knob-cell"><div class="knob-label">filter reso</div><div class="knob" data-param="filterReso" data-value="0.30"></div></div>
      <div class="knob-cell"><div class="knob-label">transpose</div><div class="knob" data-param="transpose" data-value="0.50"></div></div>
      <div class="knob-cell"><div class="knob-label">detune</div><div class="knob" data-param="detune" data-value="0.50"></div></div>
      <div class="knob-cell"><div class="knob-label">attack</div><div class="knob" data-param="attack" data-value="0.05"></div></div>
      <div class="knob-cell"><div class="knob-label">hold</div><div class="knob" data-param="hold" data-value="0.40"></div></div>
      <div class="knob-cell"><div class="knob-label">decay</div><div class="knob" data-param="decay" data-value="0.55"></div></div>
      <div class="knob-cell"><div class="knob-label">pan</div><div class="knob" data-param="pan" data-value="0.50"></div></div>
    </div>

    <div class="velocity" id="velocity"><div class="playhead" id="playhead"></div></div>

    <div class="pads" id="pads"></div>

    <div class="transport">
      <div class="ctrl"><svg viewBox="0 0 24 24"><path d="M9 14 L4 14 L4 9"/><path d="M4 14 C4 8 8 5 12 5 C16 5 20 8 20 13"/></svg></div>
      <div class="ctrl"><svg viewBox="0 0 24 24"><path d="M15 14 L20 14 L20 9"/><path d="M20 14 C20 8 16 5 12 5 C8 5 4 8 4 13"/></svg></div>
      <div class="ctrl" id="clearBtn"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="12" height="12" rx="1"/><rect x="8" y="8" width="12" height="12" rx="1"/></svg></div>
      <div class="ctrl"><svg viewBox="0 0 24 24"><line x1="4" y1="4" x2="20" y2="4"/><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="14" x2="20" y2="14"/><line x1="4" y1="19" x2="20" y2="19"/></svg></div>
      <div class="ctrl"></div>
      <div class="ctrl play" id="playBtn"><svg id="playIcon" viewBox="0 0 24 24"><path d="M7 5 L19 12 L7 19 Z"/></svg></div>
    </div>

    <div class="footer-row">
      <div class="selected-sound" id="selSound">sound 01 / kick</div>
      <div class="signature">klinekraft</div>
    </div>
  </div>

<script>
const SOUND_NAMES = ['kick','snare','clap','hat c','hat o','tom','rim','perc'];
const NUM_SOUNDS = 8, NUM_STEPS = 16;
const state = {
  bpm: 92,
  bpmCycle: [80, 92, 110, 128],
  selectedSound: 0,
  pattern: Array.from({length: NUM_SOUNDS}, () => Array(NUM_STEPS).fill(false)),
  knobs: { filterFreq: 0.62, filterReso: 0.30, transpose: 0.50, detune: 0.50, attack: 0.05, hold: 0.40, decay: 0.55, pan: 0.50 },
  mode: 'pads',
  playing: false,
  currentStep: 0
};
state.pattern[0] = [true,false,false,false, true,false,false,false, true,false,false,false, true,false,false,false];
state.pattern[1] = [false,false,false,false, true,false,false,false, false,false,false,false, true,false,false,false];
state.pattern[3] = [true,false,true,false, true,false,true,false, true,false,true,false, true,false,true,false];

function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function arcPath(cx,cy,r,a1,a2){
  const x1 = cx + Math.cos(a1)*r, y1 = cy + Math.sin(a1)*r;
  const x2 = cx + Math.cos(a2)*r, y2 = cy + Math.sin(a2)*r;
  const large = (a2-a1) > Math.PI ? 1 : 0;
  return `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2}`;
}
function renderKnob(el){
  const v = clamp(parseFloat(el.dataset.value), 0, 1);
  const cx = 26, cy = 26, r = 20;
  const startA = -135 * Math.PI / 180, endA = 135 * Math.PI / 180;
  const valA = startA + (endA - startA) * v;
  const tx1 = cx + Math.cos(valA)*(r-9), ty1 = cy + Math.sin(valA)*(r-9);
  const tx2 = cx + Math.cos(valA)*(r-2), ty2 = cy + Math.sin(valA)*(r-2);
  const param = el.dataset.param;
  let display;
  if (param === 'transpose') { const s = Math.round((v-0.5)*24); display = (s>0?'+':'')+s; }
  else if (param === 'detune') { const c = Math.round((v-0.5)*100); display = (c>0?'+':'')+c; }
  else if (param === 'pan') { const p = Math.round((v-0.5)*100); display = p===0?'c':(p<0?'l'+Math.abs(p):'r'+p); }
  else { display = Math.round(v*100); }
  el.innerHTML = `<svg viewBox="0 0 52 52"><path class="track" d="${arcPath(cx,cy,r,startA,endA)}"/><path class="arc" d="${arcPath(cx,cy,r,startA,valA)}"/><line class="tick" x1="${tx1}" y1="${ty1}" x2="${tx2}" y2="${ty2}"/></svg><div class="knob-value">${display}</div>`;
}
function setupKnob(el){
  renderKnob(el);
  let active=false, mode=null, startX=0, startY=0, startVal=0, cx=0, cy=0, startAngle=0, fadeTimer=null;
  el.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    el.setPointerCapture(e.pointerId);
    active = true; mode = null;
    const r = el.getBoundingClientRect();
    cx = r.left + r.width/2; cy = r.top + r.height/2;
    startX = e.clientX; startY = e.clientY;
    startVal = parseFloat(el.dataset.value);
    startAngle = Math.atan2(e.clientY - cy, e.clientX - cx);
    el.classList.add('editing');
    if (fadeTimer) clearTimeout(fadeTimer);
  });
  el.addEventListener('pointermove', (e) => {
    if (!active) return;
    const dx = e.clientX - startX, dy = e.clientY - startY;
    if (mode === null){
      if (Math.hypot(dx,dy) < 6) return;
      const dist = Math.hypot(e.clientX - cx, e.clientY - cy);
      const ang = Math.atan2(dy, dx) * 180 / Math.PI;
      const isVert = Math.abs(Math.abs(ang) - 90) < 35;
      mode = (isVert && dist < 60) ? 'vertical' : 'circular';
    }
    let v = startVal;
    if (mode === 'vertical'){
      v = clamp(startVal + (-dy/200), 0, 1);
    } else {
      const cur = Math.atan2(e.clientY - cy, e.clientX - cx);
      let dA = cur - startAngle;
      if (dA > Math.PI) dA -= 2*Math.PI;
      if (dA < -Math.PI) dA += 2*Math.PI;
      v = clamp(startVal + dA / (Math.PI * 1.5), 0, 1);
    }
    el.dataset.value = v.toFixed(4);
    state.knobs[el.dataset.param] = v;
    renderKnob(el);
  });
  function end(e){
    if (!active) return;
    active = false; mode = null;
    try { el.releasePointerCapture(e.pointerId); } catch(_){}
    if (fadeTimer) clearTimeout(fadeTimer);
    fadeTimer = setTimeout(() => el.classList.remove('editing'), 700);
  }
  el.addEventListener('pointerup', end);
  el.addEventListener('pointercancel', end);
}
document.querySelectorAll('.knob').forEach(setupKnob);

const padsEl = document.getElementById('pads');
const pads = [];
for (let i = 0; i < 16; i++){
  const pad = document.createElement('div');
  pad.className = 'pad';
  pad.dataset.index = i;
  pad.innerHTML = `<span class="pad-label"></span><span class="step-num"></span><span class="step-dot"></span>`;
  pad.addEventListener('pointerdown', () => onPadDown(i, pad));
  padsEl.appendChild(pad);
  pads.push(pad);
}
function onPadDown(i, pad){
  pad.classList.add('flash');
  setTimeout(() => pad.classList.remove('flash'), 90);
  if (window.navigator.vibrate) window.navigator.vibrate(8);
  if (state.mode === 'pads'){
    if (i < NUM_SOUNDS){
      state.selectedSound = i;
      updateSelectedSound();
      applyMode();
    }
  } else {
    state.pattern[state.selectedSound][i] = !state.pattern[state.selectedSound][i];
    applyMode();
    rebuildVelocityStrip();
  }
}
function applyMode(){
  pads.forEach((pad, i) => {
    pad.classList.remove('step-mode','step-on','step-current','has-step','selected');
    const label = pad.querySelector('.pad-label');
    const num = pad.querySelector('.step-num');
    if (state.mode === 'pads'){
      if (i < NUM_SOUNDS){
        label.textContent = SOUND_NAMES[i];
        num.textContent = '';
        if (state.pattern[i].some(s => s)) pad.classList.add('has-step');
        if (i === state.selectedSound) pad.classList.add('selected');
      } else {
        label.textContent = '';
        num.textContent = '';
      }
    } else {
      pad.classList.add('step-mode');
      label.textContent = '';
      num.textContent = String(i+1).padStart(2,'0');
      if (state.pattern[state.selectedSound][i]) pad.classList.add('step-on');
      if (state.playing && i === state.currentStep) pad.classList.add('step-current');
    }
  });
}
applyMode();

const veloEl = document.getElementById('velocity');
const velBars = [];
for (let i = 0; i < NUM_STEPS; i++){
  const b = document.createElement('div');
  b.className = 'vel-bar';
  veloEl.appendChild(b);
  velBars.push(b);
}
function rebuildVelocityStrip(){
  for (let i = 0; i < NUM_STEPS; i++){
    let count = 0;
    for (let s = 0; s < NUM_SOUNDS; s++) if (state.pattern[s][i]) count++;
    if (count === 0){ velBars[i].style.height = '0%'; velBars[i].style.opacity = 0; }
    else { velBars[i].style.height = Math.min(95, 30 + count*18) + '%'; velBars[i].style.opacity = 0.78; }
  }
}
rebuildVelocityStrip();

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('pointerdown', () => {
    if (t.classList.contains('disabled')) return;
    const tab = t.dataset.tab;
    if (tab !== 'pads' && tab !== 'seq') return;
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    state.mode = tab;
    applyMode();
  });
});

const playBtn = document.getElementById('playBtn');
const playIcon = document.getElementById('playIcon');
const playhead = document.getElementById('playhead');
let loopTimer = null;
function setPlayIcon(on){
  playBtn.classList.toggle('playing', on);
  playIcon.innerHTML = on
    ? '<rect x="6" y="5" width="5" height="14"/><rect x="13" y="5" width="5" height="14"/>'
    : '<path d="M7 5 L19 12 L7 19 Z"/>';
}
function startLoop(){
  state.playing = true; setPlayIcon(true); state.currentStep = 0;
  tick();
  loopTimer = setInterval(tick, (60000/state.bpm)/4);
}
function stopLoop(){
  state.playing = false; setPlayIcon(false);
  if (loopTimer) clearInterval(loopTimer); loopTimer = null;
  state.currentStep = 0;
  playhead.style.left = '0px';
  applyMode();
}
function tick(){
  const w = veloEl.clientWidth;
  playhead.style.left = (state.currentStep * (w / NUM_STEPS)) + 'px';
  if (state.mode === 'seq'){
    pads.forEach((p,i) => p.classList.toggle('step-current', i === state.currentStep));
  }
  state.currentStep = (state.currentStep + 1) % NUM_STEPS;
}
playBtn.addEventListener('pointerdown', () => { state.playing ? stopLoop() : startLoop(); });

const bpmEl = document.getElementById('bpmDisplay');
bpmEl.addEventListener('pointerdown', () => {
  const idx = state.bpmCycle.indexOf(state.bpm);
  state.bpm = state.bpmCycle[(idx+1) % state.bpmCycle.length];
  bpmEl.textContent = state.bpm + ' bpm';
  if (state.playing){ stopLoop(); startLoop(); }
});
document.getElementById('clearBtn').addEventListener('pointerdown', () => {
  if (state.mode === 'seq') state.pattern[state.selectedSound].fill(false);
  else state.pattern.forEach(r => r.fill(false));
  applyMode();
  rebuildVelocityStrip();
  if (window.navigator.vibrate) window.navigator.vibrate(12);
});

function updateSelectedSound(){
  const num = String(state.selectedSound+1).padStart(2,'0');
  document.getElementById('selSound').textContent = `sound ${num} / ${SOUND_NAMES[state.selectedSound]}`;
}
updateSelectedSound();
</script>
</body>
</html>
