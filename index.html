<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="klinekraft beat">
<meta name="theme-color" content="#dbd7d3">
<title>klinekraft beat</title>

<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' fill='%23dbd7d3'/><text x='90' y='128' font-family='Helvetica Neue, Helvetica, Arial' font-size='128' font-weight='400' text-anchor='middle' fill='%23ed3f1c'>k</text></svg>">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' fill='%23dbd7d3'/><text x='32' y='46' font-family='Helvetica Neue, Helvetica, Arial' font-size='44' text-anchor='middle' fill='%23ed3f1c'>k</text></svg>">

<style>
  :root {
    --bone: #dbd7d3;
    --bone-deep: #c9c4be;
    --pad: #c2bdb6;
    --pad-pressed: #b3aea6;
    --pad-selected: #a8a39b;
    --ink: #1a1a1a;
    --ink-soft: #5a5752;
    --hairline: #b0aba3;
    --accent: #ed3f1c;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bone); color: var(--ink);
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    user-select: none; -webkit-user-select: none;
    overscroll-behavior: none;
  }
  body {
    min-height: 100vh; min-height: 100dvh;
    display: flex; justify-content: center;
    background: radial-gradient(ellipse at top, #cfcac3 0%, #b8b3ac 100%);
  }
  .device {
    width: 100%; max-width: 393px;
    min-height: 100vh; min-height: 100dvh;
    background: var(--bone);
    display: flex; flex-direction: column; position: relative;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    overflow: hidden;
  }

  /* ---- Intro overlay ---- */
  .intro {
    position: fixed; inset: 0;
    background: var(--bone);
    z-index: 9999;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    transition: opacity 0.45s ease;
  }
  .intro.fade { opacity: 0; pointer-events: none; }
  .intro-line {
    height: 1.5px;
    background: var(--accent);
    width: 0;
    transition: width 0.42s cubic-bezier(0.5, 0, 0.2, 1);
  }
  .intro-line.draw { width: 60vw; max-width: 240px; }
  .intro-line.shrink { transition: width 0.32s cubic-bezier(0.4, 0, 0.6, 1); width: 1.5px; }
  .intro-mark {
    margin-top: 18px;
    font-size: 11px;
    letter-spacing: 0.32em;
    text-transform: lowercase;
    color: var(--ink);
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .intro-mark.show { opacity: 1; }

  /* ---- Top bar ---- */
  .topbar {
    height: 52px; flex-shrink: 0;
    display: grid; grid-template-columns: 52px 1fr 72px;
    align-items: center; padding: 0 16px;
    border-bottom: 1px solid var(--hairline);
  }
  .back { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .back svg { width: 16px; height: 16px; stroke: var(--ink-soft); }
  .kit-name { text-align: center; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; cursor: pointer; }
  .bpm { text-align: right; font-size: 11px; letter-spacing: 0.12em; color: var(--ink-soft); font-variant-numeric: tabular-nums; cursor: pointer; }

  /* ---- Tabs ---- */
  .tabs { display: grid; grid-template-columns: repeat(4, 1fr); height: 44px; border-bottom: 1px solid var(--hairline); flex-shrink: 0; }
  .tab { display: flex; align-items: center; justify-content: center; font-size: 11px; letter-spacing: 0.08em; color: var(--ink-soft); position: relative; cursor: pointer; }
  .tab.active { color: var(--ink); }
  .tab.active::after { content: ""; position: absolute; left: 50%; bottom: -1px; transform: translateX(-50%); width: 28px; height: 2px; background: var(--accent); }

  /* ---- Knobs ---- */
  .knobs { padding: 22px 16px 16px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px 8px; flex-shrink: 0; }
  .knob-cell { display: flex; flex-direction: column; align-items: center; gap: 8px; position: relative; }
  .knob-label { font-size: 9px; letter-spacing: 0.14em; text-transform: lowercase; color: var(--ink-soft); }
  .knob { width: 72px; height: 72px; position: relative; touch-action: none; cursor: ns-resize; }
  .knob svg { width: 100%; height: 100%; display: block; pointer-events: none; }
  .knob .track { fill: none; stroke: var(--bone-deep); stroke-width: 2.4; }
  .knob .arc { fill: none; stroke: var(--accent); stroke-width: 2.4; }
  .knob .tick { stroke: var(--ink); stroke-width: 1.6; }
  .knob-value { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--ink); opacity: 0; pointer-events: none; font-variant-numeric: tabular-nums; transition: opacity 0.18s ease; }
  .knob.editing .knob-value { opacity: 1; }
  .knob.editing { cursor: grabbing; }

  /* ---- Velocity strip ---- */
  .velocity { height: 28px; margin: 4px 16px 8px; border-top: 1px solid var(--hairline); border-bottom: 1px solid var(--hairline); display: flex; align-items: flex-end; justify-content: space-between; padding: 4px 0; position: relative; overflow: hidden; flex-shrink: 0; }
  .vel-bar { width: 2px; background: var(--accent); opacity: 0.78; transition: height 0.06s ease; }
  .playhead { position: absolute; top: 0; bottom: 0; width: 1px; background: var(--ink); opacity: 0.5; left: 0; pointer-events: none; }

  /* ---- Pads ---- */
  .pads { flex: 1; padding: 4px 16px 8px; display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); gap: 6px; min-height: 280px; }
  .pad {
    background: var(--pad); border-radius: 3px; position: relative; cursor: pointer;
    transition: background 0.06s ease, transform 0.06s ease;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.25), inset 0 -1px 0 rgba(0,0,0,0.06);
    display: flex; align-items: flex-start; justify-content: flex-start; padding: 8px;
    touch-action: none;
  }
  .pad.flash { background: var(--accent); transform: scale(0.985); }
  .pad.selected {
    background: var(--pad);
    box-shadow:
      inset 0 0 0 1.5px var(--accent),
      inset 0 1px 0 rgba(255,255,255,0.25),
      inset 0 -1px 0 rgba(0,0,0,0.06);
  }
  .pad.empty { opacity: 0.45; cursor: default; }
  .pad-label { font-size: 8px; letter-spacing: 0.1em; text-transform: lowercase; color: var(--ink-soft); pointer-events: none; }
  .pad.flash .pad-label { color: rgba(255,255,255,0.9); }
  .pad .step-dot { position: absolute; bottom: 7px; right: 7px; width: 7px; height: 7px; background: var(--accent); opacity: 0; transition: opacity 0.1s ease; }
  .pad.has-step .step-dot { opacity: 1; }
  .step-num { font-size: 9px; letter-spacing: 0.06em; color: var(--ink-soft); font-variant-numeric: tabular-nums; pointer-events: none; display: none; }

  .pad.step-mode { padding: 0; align-items: center; justify-content: center; }
  .pad.step-mode .pad-label { display: none; }
  .pad.step-mode .step-dot { display: none; }
  .pad.step-mode .step-num { display: block; }
  .pad.step-mode.step-on { background: var(--accent); }
  .pad.step-mode.step-on .step-num { color: rgba(255,255,255,0.9); }
  .pad.step-mode.step-current { box-shadow: inset 0 0 0 2px var(--ink), inset 0 1px 0 rgba(255,255,255,0.25); }
  .pad.step-mode.step-on.editing-vel { box-shadow: inset 0 0 0 2px var(--ink); }

  .vel-slider {
    position: absolute; left: 6px; right: 6px; bottom: 6px;
    background: rgba(255,255,255,0.85);
    border-radius: 1.5px;
    pointer-events: none;
    display: none;
  }
  .pad.step-mode.step-on.editing-vel .vel-slider { display: block; }

  /* ---- Transport ---- */
  .transport { height: 52px; flex-shrink: 0; display: grid; grid-template-columns: repeat(6, 1fr); align-items: center; padding: 0 16px; border-top: 1px solid var(--hairline); }
  .ctrl { display: flex; align-items: center; justify-content: center; height: 100%; cursor: pointer; }
  .ctrl svg { width: 18px; height: 18px; stroke: var(--ink-soft); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
  .ctrl.play svg { fill: var(--ink-soft); stroke: var(--ink-soft); }
  .ctrl.play.playing svg { fill: var(--accent); stroke: var(--accent); }

  .footer-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px 12px; }
  .selected-sound { font-size: 9px; letter-spacing: 0.18em; text-transform: lowercase; color: var(--ink-soft); font-variant-numeric: tabular-nums; }
  .signature { font-size: 9px; letter-spacing: 0.22em; text-transform: lowercase; color: var(--ink); opacity: 0.32; }

  /* ---- First-time hint ---- */
  .hint {
    position: absolute;
    left: 16px; right: 16px;
    bottom: 100px;
    background: var(--ink);
    color: var(--bone);
    padding: 10px 14px;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-align: center;
    border-radius: 2px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none;
    z-index: 100;
    text-transform: lowercase;
  }
  .hint.show { opacity: 0.92; transform: translateY(0); }

  /* ---- Library drawer ---- */
  .drawer-backdrop {
    position: fixed; inset: 0;
    background: rgba(20,18,16,0.35);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    z-index: 200;
  }
  .drawer-backdrop.open { opacity: 1; pointer-events: auto; }

  .drawer {
    position: fixed;
    left: 50%;
    transform: translateX(-50%) translateY(100%);
    bottom: 0;
    width: 100%;
    max-width: 393px;
    background: var(--bone);
    border-top: 1px solid var(--hairline);
    z-index: 201;
    transition: transform 0.32s cubic-bezier(0.32, 0.72, 0.3, 1);
    padding-bottom: env(safe-area-inset-bottom);
    display: flex;
    flex-direction: column;
    max-height: 70vh;
  }
  .drawer.open { transform: translateX(-50%) translateY(0); }
  .drawer-handle {
    width: 36px; height: 3px;
    background: var(--hairline);
    border-radius: 2px;
    margin: 8px auto 4px;
  }
  .drawer-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px 12px;
    border-bottom: 1px solid var(--hairline);
  }
  .drawer-title { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; }
  .drawer-action {
    font-size: 10px; letter-spacing: 0.12em; text-transform: lowercase;
    color: var(--accent); cursor: pointer;
  }
  .drawer-list {
    overflow-y: auto;
    padding: 4px 0 16px;
    -webkit-overflow-scrolling: touch;
  }
  .lib-item {
    display: grid;
    grid-template-columns: 1fr auto auto;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid var(--hairline);
    gap: 12px;
    cursor: pointer;
  }
  .lib-item.empty {
    color: var(--ink-soft);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: lowercase;
    text-align: center;
    display: block;
    padding: 20px 16px;
    cursor: default;
  }
  .lib-name {
    font-size: 12px;
    color: var(--ink);
  }
  .lib-meta {
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: lowercase;
    color: var(--ink-soft);
    font-variant-numeric: tabular-nums;
  }
  .lib-del {
    font-size: 10px;
    color: var(--ink-soft);
    text-transform: lowercase;
    letter-spacing: 0.08em;
    cursor: pointer;
    padding: 4px 6px;
  }
  .lib-del:active { color: var(--accent); }

  /* ---- Save dialog (inline at top of drawer) ---- */
  .save-row {
    display: none;
    padding: 12px 16px;
    border-bottom: 1px solid var(--hairline);
    gap: 8px;
    align-items: center;
  }
  .save-row.show { display: flex; }
  .save-row input {
    flex: 1;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--hairline);
    padding: 6px 0;
    font: inherit;
    font-size: 12px;
    color: var(--ink);
    outline: none;
  }
  .save-row input:focus { border-bottom-color: var(--accent); }
  .save-confirm {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: lowercase;
    color: var(--accent);
    cursor: pointer;
    padding: 6px 8px;
  }
</style>
</head>
<body>

<!-- Hidden silent audio loop — elevates iOS audio session to 'playback' so Web Audio plays through the silent switch -->
<audio id="silentLoop" loop playsinline preload="auto" style="display:none"
       src="data:audio/wav;base64,UklGRpQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YXAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="></audio>

<!-- INTRO -->
<div class="intro" id="intro">
  <div class="intro-line" id="introLine"></div>
  <div class="intro-mark" id="introMark">klinekraft</div>
</div>

<div class="device">
  <div class="topbar">
    <div class="back"><svg viewBox="0 0 16 16" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 3 L5 8 L10 13"/></svg></div>
    <div class="kit-name" id="kitName">studio 01</div>
    <div class="bpm" id="bpmDisplay">92 bpm</div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="pads">pads</div>
    <div class="tab" data-tab="seq">seq</div>
    <div class="tab" data-tab="padfx">pad fx</div>
    <div class="tab" data-tab="kitfx">kit fx</div>
  </div>

  <div class="knobs" id="knobs"></div>

  <div class="velocity" id="velocity"><div class="playhead" id="playhead"></div></div>

  <div class="pads" id="pads"></div>

  <div class="transport">
    <div class="ctrl"><svg viewBox="0 0 24 24"><path d="M9 14 L4 14 L4 9"/><path d="M4 14 C4 8 8 5 12 5 C16 5 20 8 20 13"/></svg></div>
    <div class="ctrl"><svg viewBox="0 0 24 24"><path d="M15 14 L20 14 L20 9"/><path d="M20 14 C20 8 16 5 12 5 C8 5 4 8 4 13"/></svg></div>
    <div class="ctrl" id="clearBtn"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="12" height="12" rx="1"/><rect x="8" y="8" width="12" height="12" rx="1"/></svg></div>
    <div class="ctrl"><svg viewBox="0 0 24 24"><line x1="4" y1="4" x2="20" y2="4"/><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="14" x2="20" y2="14"/><line x1="4" y1="19" x2="20" y2="19"/></svg></div>
    <div class="ctrl"></div>
    <div class="ctrl play" id="playBtn"><svg id="playIcon" viewBox="0 0 24 24"><path d="M7 5 L19 12 L7 19 Z"/></svg></div>
  </div>

  <div class="footer-row">
    <div class="selected-sound" id="selSound">sound 01 / kick</div>
    <div class="signature">klinekraft</div>
  </div>

  <div class="hint" id="hint"></div>
</div>

<!-- LIBRARY DRAWER -->
<div class="drawer-backdrop" id="drawerBackdrop"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-header">
    <div class="drawer-title">library</div>
    <div class="drawer-action" id="saveAction">save current</div>
  </div>
  <div class="save-row" id="saveRow">
    <input type="text" id="saveName" placeholder="pattern name" maxlength="28" />
    <div class="save-confirm" id="saveConfirm">save</div>
  </div>
  <div class="drawer-list" id="drawerList"></div>
</div>

<script>
/* ============================================================
   STATE
============================================================ */
const SOUND_NAMES = ['kick','snare','clap','hat c','hat o','tom','rim','perc','c3','e3','g3','c4'];
const SYNTH_FREQS = { 8: 130.81, 9: 164.81, 10: 196.00, 11: 261.63 };
const NUM_SOUNDS = SOUND_NAMES.length;
const NUM_PADS = 16;
const NUM_STEPS = 16;

const KNOB_DEFS = {
  pads:  [
    {param:'filterFreq',  label:'filter freq', def:0.85},
    {param:'filterReso',  label:'filter reso', def:0.15},
    {param:'transpose',   label:'transpose',   def:0.50},
    {param:'detune',      label:'detune',      def:0.50},
    {param:'attack',      label:'attack',      def:0.05},
    {param:'hold',        label:'hold',        def:0.40},
    {param:'decay',       label:'decay',       def:0.55},
    {param:'pan',         label:'pan',         def:0.50}
  ],
  // step mode shows the same kit knobs (same controls, same global feel)
  seq:   [
    {param:'filterFreq',  label:'filter freq', def:0.85},
    {param:'filterReso',  label:'filter reso', def:0.15},
    {param:'transpose',   label:'transpose',   def:0.50},
    {param:'detune',      label:'detune',      def:0.50},
    {param:'attack',      label:'attack',      def:0.05},
    {param:'hold',        label:'hold',        def:0.40},
    {param:'decay',       label:'decay',       def:0.55},
    {param:'pan',         label:'pan',         def:0.50}
  ],
  // kit FX: 4 controls active, 4 dimmed for visual balance
  kitfx: [
    {param:'kitRevAmt',   label:'rev amt',     def:0.20},
    {param:'kitRevSize',  label:'rev size',    def:0.50},
    {param:'kitDelTime',  label:'del time',    def:0.50},
    {param:'kitDelFb',    label:'del fb',      def:0.30},
    {param:'_kitX1',      label:'',            def:0.50, dim:true},
    {param:'_kitX2',      label:'',            def:0.50, dim:true},
    {param:'_kitX3',      label:'',            def:0.50, dim:true},
    {param:'_kitX4',      label:'',            def:0.50, dim:true}
  ],
  // pad FX: same set, but per-pad
  padfx: [
    {param:'padRevAmt',   label:'rev amt',     def:0.00, perPad:true},
    {param:'padRevSize',  label:'rev size',    def:0.50, perPad:true},
    {param:'padDelAmt',   label:'del amt',     def:0.00, perPad:true},
    {param:'padDelFb',    label:'del fb',      def:0.30, perPad:true},
    {param:'_padX1',      label:'',            def:0.50, dim:true},
    {param:'_padX2',      label:'',            def:0.50, dim:true},
    {param:'_padX3',      label:'',            def:0.50, dim:true},
    {param:'_padX4',      label:'',            def:0.50, dim:true}
  ]
};

const DEFAULT_KIT_KNOBS = { filterFreq:0.85, filterReso:0.15, transpose:0.50, detune:0.50, attack:0.05, hold:0.40, decay:0.55, pan:0.50 };
const DEFAULT_KITFX = { kitRevAmt:0.20, kitRevSize:0.50, kitDelTime:0.50, kitDelFb:0.30 };
const DEFAULT_PADFX = { padRevAmt:0.00, padRevSize:0.50, padDelAmt:0.00, padDelFb:0.30 };

const state = {
  bpm: 92,
  bpmCycle: [80, 92, 110, 128],
  selectedSound: 0,
  pattern: Array.from({length: NUM_SOUNDS}, () => Array(NUM_STEPS).fill(0)),
  knobs: { ...DEFAULT_KIT_KNOBS, ...DEFAULT_KITFX },
  // Per-pad FX: NUM_SOUNDS × {padRevAmt, padRevSize, padDelAmt, padDelFb}
  padFx: Array.from({length: NUM_SOUNDS}, () => ({...DEFAULT_PADFX})),
  mode: 'pads',
  playing: false,
  currentStep: 0,
  hintsSeen: { pads: false, seq: false }
};

// Default groove
state.pattern[0] = [100,0,0,0, 100,0,0,0, 100,0,0,0, 100,0,0,0];
state.pattern[1] = [0,0,0,0, 100,0,0,0, 0,0,0,0, 100,0,0,0];
state.pattern[3] = [100,0,90,0, 100,0,90,0, 100,0,90,0, 100,0,90,0];

/* ============================================================
   PERSISTENCE — current session
============================================================ */
const STORAGE_KEY = 'klinekraft-beat-v2';
function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      bpm: state.bpm,
      selectedSound: state.selectedSound,
      pattern: state.pattern,
      knobs: state.knobs,
      padFx: state.padFx,
      mode: state.mode,
      hintsSeen: state.hintsSeen
    }));
  } catch (e) {}
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) {
      // Try migrate from v1
      const old = localStorage.getItem('klinekraft-beat-v1');
      if (old) loadFromObject(JSON.parse(old));
      return;
    }
    loadFromObject(JSON.parse(raw));
  } catch (e) {}
}
function loadFromObject(saved) {
  if (saved.bpm) state.bpm = saved.bpm;
  if (saved.selectedSound !== undefined) state.selectedSound = saved.selectedSound;
  if (saved.pattern && Array.isArray(saved.pattern)) {
    for (let s = 0; s < NUM_SOUNDS; s++) {
      if (saved.pattern[s] && Array.isArray(saved.pattern[s])) {
        for (let i = 0; i < NUM_STEPS; i++) {
          const v = saved.pattern[s][i];
          if (v === true) state.pattern[s][i] = 100;
          else if (typeof v === 'number') state.pattern[s][i] = v;
          else if (v === false) state.pattern[s][i] = 0;
        }
      }
    }
  }
  if (saved.knobs) Object.assign(state.knobs, saved.knobs);
  if (saved.padFx && Array.isArray(saved.padFx)) {
    for (let s = 0; s < NUM_SOUNDS; s++) {
      if (saved.padFx[s]) Object.assign(state.padFx[s], saved.padFx[s]);
    }
  }
  if (saved.mode) state.mode = saved.mode;
  if (saved.hintsSeen) Object.assign(state.hintsSeen, saved.hintsSeen);
}
loadState();

/* ============================================================
   LIBRARY (named patterns)
============================================================ */
const LIB_KEY = 'klinekraft-beat-library-v1';
function getLibrary() {
  try { return JSON.parse(localStorage.getItem(LIB_KEY) || '[]'); }
  catch(_) { return []; }
}
function setLibrary(lib) {
  try { localStorage.setItem(LIB_KEY, JSON.stringify(lib)); } catch(_){}
}
function snapshotCurrent(name) {
  return {
    id: 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
    name: name || ('pattern ' + new Date().toLocaleString()),
    savedAt: Date.now(),
    bpm: state.bpm,
    pattern: JSON.parse(JSON.stringify(state.pattern)),
    knobs: { ...state.knobs },
    padFx: JSON.parse(JSON.stringify(state.padFx))
  };
}
function loadFromSnapshot(snap) {
  state.bpm = snap.bpm;
  state.pattern = JSON.parse(JSON.stringify(snap.pattern));
  state.knobs = { ...DEFAULT_KIT_KNOBS, ...DEFAULT_KITFX, ...snap.knobs };
  if (snap.padFx) state.padFx = JSON.parse(JSON.stringify(snap.padFx));
  bpmEl.textContent = state.bpm + ' bpm';
  applyKnobsToAudio();
  buildKnobs();
  applyMode();
  rebuildVelocityStrip();
  saveState();
}

/* ============================================================
   AUDIO ENGINE
   Routing per voice:
     voice -> padBus[soundIdx] -> (dry to kit chain) +
                                  (per-pad reverb send -> padReverb -> kit chain) +
                                  (per-pad delay send  -> padDelay  -> kit chain)
     kit chain: kitFilter -> kitDelay (parallel) + kitReverb (parallel) -> kitPanner -> masterGain
============================================================ */
let audioCtx = null;
let masterGain = null;
let kitFilter = null;
let kitPanner = null;
let kitInput = null;       // pre-filter sum point
let kitReverb = null, kitReverbWet = null, kitReverbInput = null;
let kitDelay = null, kitDelayFb = null, kitDelayWet = null, kitDelayInput = null;
// Per-pad
const padBus = [];         // dry-only output of voice
const padReverb = [], padReverbInput = [], padReverbWet = [];
const padDelay = [], padDelayFb = [], padDelayWet = [], padDelayInput = [];

function makeReverbIR(sizeNorm) {
  // sizeNorm: 0..1 -> 0.4s..3.5s
  const sr = audioCtx.sampleRate;
  const dur = 0.4 + sizeNorm * 3.1;
  const len = Math.floor(sr * dur);
  const buf = audioCtx.createBuffer(2, len, sr);
  for (let ch = 0; ch < 2; ch++) {
    const data = buf.getChannelData(ch);
    for (let i = 0; i < len; i++) {
      const t = i / len;
      // Decaying noise with a slight low-frequency lift for warmth
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, 2 + sizeNorm * 2);
    }
  }
  return buf;
}

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // master
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.7;
  masterGain.connect(audioCtx.destination);

  // panner -> master
  kitPanner = audioCtx.createStereoPanner ? audioCtx.createStereoPanner() : null;
  if (kitPanner) kitPanner.connect(masterGain);

  // filter -> panner (or master if panner unsupported)
  kitFilter = audioCtx.createBiquadFilter();
  kitFilter.type = 'lowpass';
  kitFilter.frequency.value = 18000;
  kitFilter.Q.value = 0.7;
  kitFilter.connect(kitPanner || masterGain);

  // kit input (everything sums here pre-filter)
  kitInput = audioCtx.createGain();
  kitInput.gain.value = 1;
  kitInput.connect(kitFilter);

  // kit reverb chain (parallel)
  kitReverbInput = audioCtx.createGain();
  kitReverbInput.gain.value = 1;
  kitReverb = audioCtx.createConvolver();
  kitReverb.buffer = makeReverbIR(0.5);
  kitReverbWet = audioCtx.createGain();
  kitReverbWet.gain.value = 0;
  kitReverbInput.connect(kitReverb).connect(kitReverbWet).connect(kitInput);

  // kit delay chain (parallel, with feedback loop)
  kitDelayInput = audioCtx.createGain();
  kitDelayInput.gain.value = 1;
  kitDelay = audioCtx.createDelay(2.0);
  kitDelayFb = audioCtx.createGain();
  kitDelayFb.gain.value = 0.3;
  kitDelayWet = audioCtx.createGain();
  kitDelayWet.gain.value = 0;
  kitDelayInput.connect(kitDelay);
  kitDelay.connect(kitDelayFb).connect(kitDelay); // feedback loop
  kitDelay.connect(kitDelayWet).connect(kitInput);

  // Per-pad chains
  for (let s = 0; s < NUM_SOUNDS; s++) {
    const bus = audioCtx.createGain();
    bus.gain.value = 1;
    bus.connect(kitInput);                  // dry path
    bus.connect(kitReverbInput);            // also feeds kit reverb input
    bus.connect(kitDelayInput);             // also feeds kit delay input
    padBus.push(bus);

    // Per-pad reverb
    const pri = audioCtx.createGain(); pri.gain.value = 0;     // pad reverb send amount
    const pr  = audioCtx.createConvolver(); pr.buffer = makeReverbIR(0.5);
    const prw = audioCtx.createGain(); prw.gain.value = 1;     // wet trim (1 since pri controls send)
    bus.connect(pri).connect(pr).connect(prw).connect(kitInput);
    padReverbInput.push(pri); padReverb.push(pr); padReverbWet.push(prw);

    // Per-pad delay
    const pdi = audioCtx.createGain(); pdi.gain.value = 0;     // pad delay send amount
    const pd  = audioCtx.createDelay(2.0);
    const pdf = audioCtx.createGain(); pdf.gain.value = 0.3;
    const pdw = audioCtx.createGain(); pdw.gain.value = 1;
    bus.connect(pdi).connect(pd);
    pd.connect(pdf).connect(pd);                                // per-pad feedback loop
    pd.connect(pdw).connect(kitInput);
    padDelayInput.push(pdi); padDelay.push(pd); padDelayFb.push(pdf); padDelayWet.push(pdw);
  }

  applyKnobsToAudio();
  applyAllPadFxToAudio();
}

function ensureAudio() {
  if (!audioCtx) initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  // iOS silent-mode bypass: play a hidden silent audio loop on the first
  // user gesture. This upgrades the audio session category from 'ambient'
  // (respects silent switch) to 'playback' (ignores it). Web Audio rides
  // along on the elevated session.
  const sl = document.getElementById('silentLoop');
  if (sl && sl.paused) {
    sl.volume = 0;
    sl.play().catch(() => { /* if blocked, the next gesture will retry */ });
  }
}

function delayTimeFromKnob(v) {
  // 0..1 -> 1/16, 1/8, 3/16, 1/4 (in beats)
  const beats = [0.25, 0.5, 0.75, 1.0];
  const idx = Math.min(beats.length-1, Math.floor(v * beats.length));
  return beats[idx] * (60 / state.bpm);
}

function applyKnobsToAudio() {
  if (!audioCtx) return;
  const k = state.knobs;
  const t = audioCtx.currentTime;
  const f = 80 * Math.pow(18000/80, k.filterFreq);
  kitFilter.frequency.setTargetAtTime(f, t, 0.01);
  kitFilter.Q.setTargetAtTime(0.7 + k.filterReso * 17.3, t, 0.01);
  if (kitPanner) kitPanner.pan.setTargetAtTime((k.pan - 0.5) * 2, t, 0.01);

  // Kit FX
  kitReverbWet.gain.setTargetAtTime(k.kitRevAmt, t, 0.02);
  // size: rebuild IR if size changes meaningfully
  if (Math.abs((kitReverb._size||0.5) - k.kitRevSize) > 0.05) {
    kitReverb.buffer = makeReverbIR(k.kitRevSize);
    kitReverb._size = k.kitRevSize;
  }
  kitDelay.delayTime.setTargetAtTime(delayTimeFromKnob(k.kitDelTime), t, 0.02);
  kitDelayFb.gain.setTargetAtTime(k.kitDelFb * 0.85, t, 0.02);
  kitDelayWet.gain.setTargetAtTime(k.kitDelTime > 0 ? 0.6 : 0, t, 0.02); // delay wet always present when used
  // Note: we mix delay always at 0.6 wet but the time defines whether it's audible — feedback is the real character knob
}

function applyPadFxToAudio(soundIdx) {
  if (!audioCtx) return;
  const fx = state.padFx[soundIdx];
  const t = audioCtx.currentTime;
  padReverbInput[soundIdx].gain.setTargetAtTime(fx.padRevAmt, t, 0.02);
  if (Math.abs((padReverb[soundIdx]._size||0.5) - fx.padRevSize) > 0.05) {
    padReverb[soundIdx].buffer = makeReverbIR(fx.padRevSize);
    padReverb[soundIdx]._size = fx.padRevSize;
  }
  padDelayInput[soundIdx].gain.setTargetAtTime(fx.padDelAmt, t, 0.02);
  padDelay[soundIdx].delayTime.setTargetAtTime(delayTimeFromKnob(0.5), t, 0.02); // 1/8 default
  padDelayFb[soundIdx].gain.setTargetAtTime(fx.padDelFb * 0.85, t, 0.02);
}
function applyAllPadFxToAudio() {
  for (let s = 0; s < NUM_SOUNDS; s++) applyPadFxToAudio(s);
}

function pitchMul() {
  const semitones = (state.knobs.transpose - 0.5) * 24;
  const cents = (state.knobs.detune - 0.5) * 100;
  return Math.pow(2, (semitones + cents/100) / 12);
}
function decayTime(base = 1.0) { return (0.04 + state.knobs.decay * 1.5) * base; }
function attackTime() { return 0.001 + state.knobs.attack * 0.06; }

function noiseBuffer(durSec = 0.5) {
  const sr = audioCtx.sampleRate;
  const len = Math.floor(sr * durSec);
  const buf = audioCtx.createBuffer(1, len, sr);
  const data = buf.getChannelData(0);
  for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
  return buf;
}

function busFor(s) { return padBus[s]; }

function playKick(t, v=1, s=0) {
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(130 * pitchMul(), t);
  osc.frequency.exponentialRampToValueAtTime(45 * pitchMul(), t + 0.08);
  const dec = decayTime(0.55);
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(1.0 * v, t + attackTime());
  g.gain.exponentialRampToValueAtTime(0.001, t + dec);
  osc.connect(g).connect(busFor(s));
  osc.start(t); osc.stop(t + dec + 0.05);
}
function playSnare(t, v=1, s=1) {
  const osc = audioCtx.createOscillator();
  const og = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(220 * pitchMul(), t);
  og.gain.setValueAtTime(0, t);
  og.gain.linearRampToValueAtTime(0.45 * v, t + attackTime());
  og.gain.exponentialRampToValueAtTime(0.001, t + decayTime(0.18));
  osc.connect(og).connect(busFor(s));
  osc.start(t); osc.stop(t + 0.3);

  const n = audioCtx.createBufferSource();
  n.buffer = noiseBuffer(0.4);
  const nf = audioCtx.createBiquadFilter();
  nf.type = 'highpass'; nf.frequency.value = 1200;
  const ng = audioCtx.createGain();
  ng.gain.setValueAtTime(0, t);
  ng.gain.linearRampToValueAtTime(0.6 * v, t + attackTime());
  ng.gain.exponentialRampToValueAtTime(0.001, t + decayTime(0.22));
  n.connect(nf).connect(ng).connect(busFor(s));
  n.start(t); n.stop(t + 0.4);
}
function playClap(t, v=1, s=2) {
  const offsets = [0, 0.010, 0.020, 0.030];
  offsets.forEach((off, i) => {
    const n = audioCtx.createBufferSource();
    n.buffer = noiseBuffer(0.15);
    const f = audioCtx.createBiquadFilter();
    f.type = 'bandpass'; f.frequency.value = 1500; f.Q.value = 0.8;
    const g = audioCtx.createGain();
    const isTail = (i === offsets.length - 1);
    const dec = isTail ? decayTime(0.18) : 0.025;
    g.gain.setValueAtTime(0, t + off);
    g.gain.linearRampToValueAtTime((isTail ? 0.55 : 0.9) * v, t + off + 0.001);
    g.gain.exponentialRampToValueAtTime(0.001, t + off + dec);
    n.connect(f).connect(g).connect(busFor(s));
    n.start(t + off); n.stop(t + off + dec + 0.05);
  });
}
function playHat(t, open=false, v=1, s=3) {
  const n = audioCtx.createBufferSource();
  n.buffer = noiseBuffer(open ? 0.6 : 0.15);
  const f = audioCtx.createBiquadFilter();
  f.type = 'highpass'; f.frequency.value = 7000 * pitchMul();
  const g = audioCtx.createGain();
  const dec = decayTime(open ? 0.5 : 0.06);
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.5 * v, t + attackTime());
  g.gain.exponentialRampToValueAtTime(0.001, t + dec);
  n.connect(f).connect(g).connect(busFor(s));
  n.start(t); n.stop(t + dec + 0.05);
}
function playTom(t, v=1, s=5) {
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(180 * pitchMul(), t);
  osc.frequency.exponentialRampToValueAtTime(80 * pitchMul(), t + 0.18);
  const dec = decayTime(0.45);
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.85 * v, t + attackTime());
  g.gain.exponentialRampToValueAtTime(0.001, t + dec);
  osc.connect(g).connect(busFor(s));
  osc.start(t); osc.stop(t + dec + 0.05);
}
function playRim(t, v=1, s=6) {
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(900 * pitchMul(), t);
  const dec = decayTime(0.05);
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.5 * v, t + 0.001);
  g.gain.exponentialRampToValueAtTime(0.001, t + dec);
  osc.connect(g).connect(busFor(s));
  osc.start(t); osc.stop(t + dec + 0.02);
}
function playPerc(t, v=1, s=7) {
  const n = audioCtx.createBufferSource();
  n.buffer = noiseBuffer(0.2);
  const f = audioCtx.createBiquadFilter();
  f.type = 'bandpass'; f.frequency.value = 1200 * pitchMul(); f.Q.value = 8;
  const g = audioCtx.createGain();
  const dec = decayTime(0.15);
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.85 * v, t + 0.002);
  g.gain.exponentialRampToValueAtTime(0.001, t + dec);
  n.connect(f).connect(g).connect(busFor(s));
  n.start(t); n.stop(t + dec + 0.05);
}
function playSynth(t, freqHz, v=1, s=8) {
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = freqHz * pitchMul();
  const att = Math.max(attackTime(), 0.012);
  const dec = decayTime(1.6);
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.5 * v, t + att);
  g.gain.exponentialRampToValueAtTime(0.001, t + dec);
  osc.connect(g).connect(busFor(s));
  osc.start(t); osc.stop(t + dec + 0.05);
}
function playSound(soundIdx, when, vel=100) {
  if (!audioCtx) return;
  const t = when ?? audioCtx.currentTime;
  const v = vel / 100;
  switch (soundIdx) {
    case 0: playKick(t, v, soundIdx); break;
    case 1: playSnare(t, v, soundIdx); break;
    case 2: playClap(t, v, soundIdx); break;
    case 3: playHat(t, false, v, soundIdx); break;
    case 4: playHat(t, true, v, soundIdx); break;
    case 5: playTom(t, v, soundIdx); break;
    case 6: playRim(t, v, soundIdx); break;
    case 7: playPerc(t, v, soundIdx); break;
    case 8: case 9: case 10: case 11:
      playSynth(t, SYNTH_FREQS[soundIdx], v, soundIdx); break;
  }
}

/* ============================================================
   KNOBS — rebuilt per tab
============================================================ */
const knobsContainer = document.getElementById('knobs');
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function arcPath(cx,cy,r,a1,a2){
  const x1 = cx + Math.cos(a1)*r, y1 = cy + Math.sin(a1)*r;
  const x2 = cx + Math.cos(a2)*r, y2 = cy + Math.sin(a2)*r;
  const large = (a2-a1) > Math.PI ? 1 : 0;
  return `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2}`;
}

function getKnobValue(def) {
  if (def.dim) return def.def;
  if (def.perPad) {
    return state.padFx[state.selectedSound][def.param] ?? def.def;
  }
  return state.knobs[def.param] ?? def.def;
}
function setKnobValue(def, v) {
  if (def.dim) return;
  if (def.perPad) {
    state.padFx[state.selectedSound][def.param] = v;
    applyPadFxToAudio(state.selectedSound);
  } else {
    state.knobs[def.param] = v;
    applyKnobsToAudio();
  }
}

function buildKnobs() {
  knobsContainer.innerHTML = '';
  const defs = KNOB_DEFS[state.mode] || KNOB_DEFS.pads;
  defs.forEach(def => {
    const cell = document.createElement('div');
    cell.className = 'knob-cell';
    cell.innerHTML = `
      <div class="knob-label">${def.label}</div>
      <div class="knob" data-param="${def.param}"${def.dim?' style="opacity:0.25;pointer-events:none"':''} data-perpad="${def.perPad?1:0}"></div>
    `;
    knobsContainer.appendChild(cell);
    const knobEl = cell.querySelector('.knob');
    knobEl._def = def;
    knobEl.dataset.value = getKnobValue(def);
    setupKnob(knobEl);
  });
}

function renderKnob(el){
  const v = clamp(parseFloat(el.dataset.value), 0, 1);
  const cx = 36, cy = 36, r = 28;
  const startA = -135 * Math.PI / 180, endA = 135 * Math.PI / 180;
  const valA = startA + (endA - startA) * v;
  const tx1 = cx + Math.cos(valA)*(r-11), ty1 = cy + Math.sin(valA)*(r-11);
  const tx2 = cx + Math.cos(valA)*(r-2), ty2 = cy + Math.sin(valA)*(r-2);
  const param = el.dataset.param;
  let display;
  if (param === 'transpose') { const s = Math.round((v-0.5)*24); display = (s>0?'+':'')+s; }
  else if (param === 'detune') { const c = Math.round((v-0.5)*100); display = (c>0?'+':'')+c; }
  else if (param === 'pan') { const p = Math.round((v-0.5)*100); display = p===0?'c':(p<0?'l'+Math.abs(p):'r'+p); }
  else if (param === 'kitDelTime' || param === 'padDelTime') {
    const labels = ['1/16','1/8','3/16','1/4'];
    const idx = Math.min(labels.length-1, Math.floor(v * labels.length));
    display = labels[idx];
  }
  else { display = Math.round(v*100); }
  el.innerHTML = `<svg viewBox="0 0 72 72"><path class="track" d="${arcPath(cx,cy,r,startA,endA)}"/><path class="arc" d="${arcPath(cx,cy,r,startA,valA)}"/><line class="tick" x1="${tx1}" y1="${ty1}" x2="${tx2}" y2="${ty2}"/></svg><div class="knob-value">${display}</div>`;
}

function setupKnob(el){
  renderKnob(el);
  let active=false, mode=null, startX=0, startY=0, startVal=0, cx=0, cy=0, startAngle=0, fadeTimer=null;
  el.addEventListener('pointerdown', (e) => {
    if (el._def && el._def.dim) return;
    e.preventDefault();
    el.setPointerCapture(e.pointerId);
    active = true; mode = null;
    const r = el.getBoundingClientRect();
    cx = r.left + r.width/2; cy = r.top + r.height/2;
    startX = e.clientX; startY = e.clientY;
    startVal = parseFloat(el.dataset.value);
    startAngle = Math.atan2(e.clientY - cy, e.clientX - cx);
    el.classList.add('editing');
    if (fadeTimer) clearTimeout(fadeTimer);
  });
  el.addEventListener('pointermove', (e) => {
    if (!active) return;
    const dx = e.clientX - startX, dy = e.clientY - startY;
    if (mode === null){
      if (Math.hypot(dx,dy) < 6) return;
      const dist = Math.hypot(e.clientX - cx, e.clientY - cy);
      const ang = Math.atan2(dy, dx) * 180 / Math.PI;
      const isVert = Math.abs(Math.abs(ang) - 90) < 35;
      mode = (isVert && dist < 80) ? 'vertical' : 'circular';
    }
    let v = startVal;
    if (mode === 'vertical'){
      v = clamp(startVal + (-dy/200), 0, 1);
    } else {
      const cur = Math.atan2(e.clientY - cy, e.clientX - cx);
      let dA = cur - startAngle;
      if (dA > Math.PI) dA -= 2*Math.PI;
      if (dA < -Math.PI) dA += 2*Math.PI;
      v = clamp(startVal + dA / (Math.PI * 1.5), 0, 1);
    }
    el.dataset.value = v.toFixed(4);
    setKnobValue(el._def, v);
    renderKnob(el);
  });
  function end(e){
    if (!active) return;
    active = false; mode = null;
    try { el.releasePointerCapture(e.pointerId); } catch(_){}
    if (fadeTimer) clearTimeout(fadeTimer);
    fadeTimer = setTimeout(() => el.classList.remove('editing'), 700);
    saveState();
  }
  el.addEventListener('pointerup', end);
  el.addEventListener('pointercancel', end);
}

/* ============================================================
   PADS
============================================================ */
const padsEl = document.getElementById('pads');
const pads = [];
const LONG_PRESS_MS = 280;
const DOUBLE_TAP_MS = 280;

for (let i = 0; i < NUM_PADS; i++){
  const pad = document.createElement('div');
  pad.className = 'pad';
  pad.dataset.index = i;
  pad.innerHTML = `
    <span class="pad-label"></span>
    <span class="step-num"></span>
    <span class="step-dot"></span>
    <span class="vel-slider"></span>
  `;
  attachPadHandlers(i, pad);
  padsEl.appendChild(pad);
  pads.push(pad);
}

function attachPadHandlers(i, pad) {
  let pressTimer = null;
  let editingVel = false;
  let lastTapAt = 0;
  let pointerStartY = 0;
  let velAtPress = 0;
  let didMoveSignificant = false;

  pad.addEventListener('pointerdown', (e) => {
    if ((state.mode === 'pads' || state.mode === 'padfx') && i >= NUM_SOUNDS) return;
    pad.setPointerCapture(e.pointerId);
    pointerStartY = e.clientY;
    didMoveSignificant = false;
    ensureAudio();

    if (state.mode === 'seq') {
      const stepOn = state.pattern[state.selectedSound][i] > 0;
      velAtPress = state.pattern[state.selectedSound][i];
      if (stepOn) {
        pressTimer = setTimeout(() => {
          editingVel = true;
          pad.classList.add('editing-vel');
          if (window.navigator.vibrate) window.navigator.vibrate(15);
          updateVelSliderDisplay(pad, state.pattern[state.selectedSound][i]);
        }, LONG_PRESS_MS);
      }
    } else {
      // pads, padfx, kitfx all: tap selects sound, plays preview (except kitfx where pad still selects sound)
      pad.classList.add('flash');
      setTimeout(() => pad.classList.remove('flash'), 90);
      if (window.navigator.vibrate) window.navigator.vibrate(8);
      if (i < NUM_SOUNDS) {
        state.selectedSound = i;
        updateSelectedSound();
        applyMode();
        playSound(i);
        // If we're in padfx, rebuild knobs to show this pad's per-pad fx values
        if (state.mode === 'padfx') buildKnobs();
        saveState();
      }
    }
  });

  pad.addEventListener('pointermove', (e) => {
    if (state.mode !== 'seq') return;
    const dy = e.clientY - pointerStartY;
    if (Math.abs(dy) > 4) didMoveSignificant = true;
    if (editingVel) {
      const newVel = clamp(Math.round(velAtPress + (-dy / 100) * 127), 1, 127);
      state.pattern[state.selectedSound][i] = newVel;
      updateVelSliderDisplay(pad, newVel);
      rebuildVelocityStrip();
    }
  });

  pad.addEventListener('pointerup', (e) => {
    try { pad.releasePointerCapture(e.pointerId); } catch(_){}
    if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }

    if (state.mode === 'seq') {
      if (editingVel) {
        editingVel = false;
        pad.classList.remove('editing-vel');
        applyMode();
        rebuildVelocityStrip();
        saveState();
        return;
      }
      if (didMoveSignificant) return;

      const now = Date.now();
      const stepCurrent = state.pattern[state.selectedSound][i];
      if (stepCurrent > 0 && (now - lastTapAt) < DOUBLE_TAP_MS) {
        state.pattern[state.selectedSound][i] = 100;
        lastTapAt = 0;
        applyMode();
        rebuildVelocityStrip();
        saveState();
        if (window.navigator.vibrate) window.navigator.vibrate(6);
        return;
      }
      lastTapAt = now;

      pad.classList.add('flash');
      setTimeout(() => pad.classList.remove('flash'), 90);
      if (window.navigator.vibrate) window.navigator.vibrate(8);

      if (stepCurrent > 0) {
        state.pattern[state.selectedSound][i] = 0;
      } else {
        state.pattern[state.selectedSound][i] = 100;
        playSound(state.selectedSound);
      }
      applyMode();
      rebuildVelocityStrip();
      saveState();
    }
  });

  pad.addEventListener('pointercancel', () => {
    if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
    if (editingVel) {
      editingVel = false;
      pad.classList.remove('editing-vel');
      applyMode();
      saveState();
    }
  });
}

function updateVelSliderDisplay(pad, vel) {
  const slider = pad.querySelector('.vel-slider');
  const pct = clamp(vel / 127, 0.05, 1);
  slider.style.height = (pct * 70) + '%';
}

function applyMode(){
  pads.forEach((pad, i) => {
    pad.classList.remove('step-mode','step-on','step-current','has-step','selected','empty','editing-vel');
    const label = pad.querySelector('.pad-label');
    const num = pad.querySelector('.step-num');
    pad.style.background = '';
    pad.style.opacity = '';

    if (state.mode === 'pads' || state.mode === 'padfx' || state.mode === 'kitfx'){
      if (i < NUM_SOUNDS){
        label.textContent = SOUND_NAMES[i];
        num.textContent = '';
        if (state.pattern[i].some(s => s > 0)) pad.classList.add('has-step');
        if (i === state.selectedSound) pad.classList.add('selected');
      } else {
        label.textContent = '';
        num.textContent = '';
        pad.classList.add('empty');
      }
    } else { // seq
      pad.classList.add('step-mode');
      label.textContent = '';
      num.textContent = String(i+1).padStart(2,'0');
      const vel = state.pattern[state.selectedSound][i];
      if (vel > 0) {
        pad.classList.add('step-on');
        const op = 0.45 + (vel/127) * 0.55;
        pad.style.opacity = op;
      }
      if (state.playing && i === state.currentStep) pad.classList.add('step-current');
    }
  });
}

/* ============================================================
   VELOCITY STRIP
============================================================ */
const veloEl = document.getElementById('velocity');
const velBars = [];
for (let i = 0; i < NUM_STEPS; i++){
  const b = document.createElement('div');
  b.className = 'vel-bar';
  veloEl.appendChild(b);
  velBars.push(b);
}
function rebuildVelocityStrip(){
  for (let i = 0; i < NUM_STEPS; i++){
    let sum = 0;
    for (let s = 0; s < NUM_SOUNDS; s++) sum += state.pattern[s][i];
    if (sum === 0){ velBars[i].style.height = '0%'; velBars[i].style.opacity = 0; }
    else {
      const h = Math.min(95, 20 + Math.sqrt(sum) * 7);
      velBars[i].style.height = h + '%';
      velBars[i].style.opacity = 0.78;
    }
  }
}
rebuildVelocityStrip();

/* ============================================================
   TABS
============================================================ */
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('pointerdown', () => {
    const tab = t.dataset.tab;
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    state.mode = tab;
    buildKnobs();
    applyMode();
    saveState();
    maybeShowHint();
  });
});
document.querySelectorAll('.tab').forEach(t => {
  t.classList.toggle('active', t.dataset.tab === state.mode);
});

/* ============================================================
   FIRST-TIME HINTS
============================================================ */
const hintEl = document.getElementById('hint');
let hintTimer = null;
function showHint(text, key) {
  if (state.hintsSeen[key]) return;
  hintEl.textContent = text;
  hintEl.classList.add('show');
  if (hintTimer) clearTimeout(hintTimer);
  hintTimer = setTimeout(() => {
    hintEl.classList.remove('show');
    state.hintsSeen[key] = true;
    saveState();
  }, 4200);
}
function maybeShowHint() {
  if (state.mode === 'pads' && !state.hintsSeen.pads) {
    showHint('tap a pad to play. tap another to switch sound.', 'pads');
  } else if (state.mode === 'seq' && !state.hintsSeen.seq) {
    showHint('tap a step to add it. long-press to set velocity.', 'seq');
  }
}
// Show initial hint after intro fades
setTimeout(maybeShowHint, 2000);

/* ============================================================
   TRANSPORT + SCHEDULER
============================================================ */
const playBtn = document.getElementById('playBtn');
const playIcon = document.getElementById('playIcon');
const playhead = document.getElementById('playhead');

const LOOKAHEAD_MS = 25;
const SCHEDULE_AHEAD_S = 0.10;

let nextStepTime = 0;
let scheduledStep = 0;
let schedulerTimer = null;
const recentTriggers = [];

function stepDuration() { return (60 / state.bpm) / 4; }

function scheduleStep(step, time) {
  for (let s = 0; s < NUM_SOUNDS; s++) {
    const v = state.pattern[s][step];
    if (v > 0) playSound(s, time, v);
  }
  recentTriggers.push({ step, audioTime: time });
}
function schedulerTick() {
  while (nextStepTime < audioCtx.currentTime + SCHEDULE_AHEAD_S) {
    scheduleStep(scheduledStep, nextStepTime);
    nextStepTime += stepDuration();
    scheduledStep = (scheduledStep + 1) % NUM_STEPS;
  }
}
function visualTick() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  while (recentTriggers.length && recentTriggers[0].audioTime <= now) {
    const t = recentTriggers.shift();
    state.currentStep = t.step;
    const w = veloEl.clientWidth;
    playhead.style.left = (state.currentStep * (w / NUM_STEPS)) + 'px';
    if (state.mode === 'seq') {
      pads.forEach((p,i) => p.classList.toggle('step-current', i === state.currentStep));
    }
  }
  if (state.playing) requestAnimationFrame(visualTick);
}
function setPlayIcon(on){
  playBtn.classList.toggle('playing', on);
  playIcon.innerHTML = on
    ? '<rect x="6" y="5" width="5" height="14"/><rect x="13" y="5" width="5" height="14"/>'
    : '<path d="M7 5 L19 12 L7 19 Z"/>';
}

let wakeLock = null;
async function requestWakeLock() {
  try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch(_){}
}
function releaseWakeLock() { if (wakeLock) { wakeLock.release().catch(()=>{}); wakeLock = null; } }
document.addEventListener('visibilitychange', () => {
  if (state.playing && document.visibilityState === 'visible') requestWakeLock();
});

function startLoop(){
  ensureAudio();
  state.playing = true;
  setPlayIcon(true);
  scheduledStep = 0;
  state.currentStep = 0;
  recentTriggers.length = 0;
  nextStepTime = audioCtx.currentTime + 0.05;
  schedulerTimer = setInterval(schedulerTick, LOOKAHEAD_MS);
  requestAnimationFrame(visualTick);
  requestWakeLock();
}
function stopLoop(){
  state.playing = false;
  setPlayIcon(false);
  if (schedulerTimer) clearInterval(schedulerTimer);
  schedulerTimer = null;
  recentTriggers.length = 0;
  state.currentStep = 0;
  playhead.style.left = '0px';
  applyMode();
  releaseWakeLock();
}
playBtn.addEventListener('pointerdown', () => {
  if (state.playing) stopLoop(); else startLoop();
});

const bpmEl = document.getElementById('bpmDisplay');
bpmEl.textContent = state.bpm + ' bpm';
bpmEl.addEventListener('pointerdown', () => {
  const idx = state.bpmCycle.indexOf(state.bpm);
  state.bpm = state.bpmCycle[(idx+1) % state.bpmCycle.length];
  bpmEl.textContent = state.bpm + ' bpm';
  applyKnobsToAudio(); // update delay times
  saveState();
});

document.getElementById('clearBtn').addEventListener('pointerdown', () => {
  if (state.mode === 'seq') state.pattern[state.selectedSound].fill(0);
  else state.pattern.forEach(r => r.fill(0));
  applyMode();
  rebuildVelocityStrip();
  saveState();
  if (window.navigator.vibrate) window.navigator.vibrate(12);
});

function updateSelectedSound(){
  const num = String(state.selectedSound+1).padStart(2,'0');
  document.getElementById('selSound').textContent = `sound ${num} / ${SOUND_NAMES[state.selectedSound]}`;
}
updateSelectedSound();

/* ============================================================
   LIBRARY DRAWER
============================================================ */
const drawer = document.getElementById('drawer');
const drawerBackdrop = document.getElementById('drawerBackdrop');
const drawerList = document.getElementById('drawerList');
const saveAction = document.getElementById('saveAction');
const saveRow = document.getElementById('saveRow');
const saveName = document.getElementById('saveName');
const saveConfirm = document.getElementById('saveConfirm');
const kitNameEl = document.getElementById('kitName');

function openDrawer() {
  renderLibrary();
  drawer.classList.add('open');
  drawerBackdrop.classList.add('open');
}
function closeDrawer() {
  drawer.classList.remove('open');
  drawerBackdrop.classList.remove('open');
  saveRow.classList.remove('show');
  saveName.value = '';
}
function renderLibrary() {
  const lib = getLibrary();
  drawerList.innerHTML = '';
  if (!lib.length) {
    const empty = document.createElement('div');
    empty.className = 'lib-item empty';
    empty.textContent = 'no saved patterns yet';
    drawerList.appendChild(empty);
    return;
  }
  // Newest first
  lib.sort((a,b) => b.savedAt - a.savedAt);
  lib.forEach(snap => {
    const row = document.createElement('div');
    row.className = 'lib-item';
    row.innerHTML = `
      <div class="lib-name"></div>
      <div class="lib-meta">${snap.bpm} bpm</div>
      <div class="lib-del">delete</div>
    `;
    row.querySelector('.lib-name').textContent = snap.name;
    row.addEventListener('pointerdown', (e) => {
      if (e.target.classList.contains('lib-del')) return;
      loadFromSnapshot(snap);
      closeDrawer();
    });
    row.querySelector('.lib-del').addEventListener('pointerdown', (e) => {
      e.stopPropagation();
      const newLib = getLibrary().filter(s => s.id !== snap.id);
      setLibrary(newLib);
      renderLibrary();
    });
    drawerList.appendChild(row);
  });
}
kitNameEl.addEventListener('pointerdown', openDrawer);
drawerBackdrop.addEventListener('pointerdown', closeDrawer);
saveAction.addEventListener('pointerdown', () => {
  saveRow.classList.add('show');
  setTimeout(() => saveName.focus(), 100);
});
saveConfirm.addEventListener('pointerdown', () => {
  const name = saveName.value.trim() || ('pattern ' + new Date().toLocaleDateString());
  const lib = getLibrary();
  lib.push(snapshotCurrent(name));
  setLibrary(lib);
  saveRow.classList.remove('show');
  saveName.value = '';
  renderLibrary();
});
saveName.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') saveConfirm.dispatchEvent(new Event('pointerdown'));
});

/* ============================================================
   INTRO ANIMATION
============================================================ */
const introEl = document.getElementById('intro');
const introLine = document.getElementById('introLine');
const introMark = document.getElementById('introMark');

let introDone = false;
function finishIntro() {
  if (introDone) return;
  introDone = true;
  introEl.classList.add('fade');
  setTimeout(() => { introEl.style.display = 'none'; }, 500);
}
introEl.addEventListener('pointerdown', finishIntro);

function runIntro() {
  // Sequence:
  //  0ms: line draws out (420ms)
  //  450ms: wordmark fades in (400ms)
  //  900ms: tick (the line shrinks briefly to a dot and back)
  //  1350ms: fade everything out
  setTimeout(() => introLine.classList.add('draw'), 50);
  setTimeout(() => introMark.classList.add('show'), 470);
  setTimeout(() => introLine.classList.add('shrink'), 920);
  setTimeout(finishIntro, 1450);
}
runIntro();

/* ============================================================
   INIT
============================================================ */
buildKnobs();
applyMode();
</script>
</body>
