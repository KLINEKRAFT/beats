<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#dbd7d3">
<title>klinekraft beat</title>
<style>
  /* ---- Type ---- */
  :root {
    --bone: #dbd7d3;
    --bone-deep: #c9c4be;
    --pad: #c2bdb6;
    --pad-pressed: #b3aea6;
    --ink: #1a1a1a;
    --ink-soft: #5a5752;
    --hairline: #b0aba3;
    --accent: #ed3f1c;       /* Braun orange */
    --accent-dim: #e6d6cf;   /* whisper of accent for filled-step indicator base */
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bone);
    color: var(--ink);
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    user-select: none;
    -webkit-user-select: none;
    overscroll-behavior: none;
  }
  body {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    /* Outside iPhone we still want it to look right — center on a slightly darker mat */
    background:
      radial-gradient(ellipse at top, #cfcac3 0%, #b8b3ac 100%);
  }

  /* ---- Device frame (only on desktop preview) ---- */
  .device {
    width: 100%;
    max-width: 393px;
    min-height: 100vh;
    min-height: 100dvh;
    background: var(--bone);
    display: flex;
    flex-direction: column;
    position: relative;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* ---- Top bar ---- */
  .topbar {
    height: 52px;
    display: grid;
    grid-template-columns: 52px 1fr 72px;
    align-items: center;
    padding: 0 16px;
    border-bottom: 1px solid var(--hairline);
  }
  .back {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .back svg { width: 16px; height: 16px; stroke: var(--ink-soft); }

  .kit-name {
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink);
  }

  .bpm {
    text-align: right;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--ink-soft);
    font-variant-numeric: tabular-nums;
  }

  /* ---- Tabs ---- */
  .tabs {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    height: 44px;
    border-bottom: 1px solid var(--hairline);
  }
  .tab {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
    position: relative;
    cursor: pointer;
  }
  .tab.active { color: var(--ink); }
  .tab.active::after {
    content: "";
    position: absolute;
    left: 50%;
    bottom: -1px;
    transform: translateX(-50%);
    width: 28px;
    height: 2px;
    background: var(--accent);
  }

  /* ---- Knob grid ---- */
  .knobs {
    padding: 18px 16px 14px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px 8px;
  }
  .knob-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .knob-label {
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: lowercase;
    color: var(--ink-soft);
  }
  .knob {
    width: 52px;
    height: 52px;
    position: relative;
  }
  .knob svg { width: 100%; height: 100%; display: block; }
  .knob .track {
    fill: none;
    stroke: var(--bone-deep);
    stroke-width: 2;
  }
  .knob .arc {
    fill: none;
    stroke: var(--accent);
    stroke-width: 2;
    stroke-linecap: butt;
    transition: stroke-dasharray 0.06s linear;
  }
  .knob .tick {
    stroke: var(--ink);
    stroke-width: 1.4;
  }
  .knob-value {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: var(--ink);
    opacity: 0;
    pointer-events: none;
    font-variant-numeric: tabular-nums;
  }
  .knob.editing .knob-value { opacity: 1; }

  /* ---- Velocity strip ---- */
  .velocity {
    height: 28px;
    margin: 4px 16px 8px;
    border-top: 1px solid var(--hairline);
    border-bottom: 1px solid var(--hairline);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 4px 0;
    position: relative;
    overflow: hidden;
  }
  .vel-bar {
    width: 2px;
    background: var(--accent);
    border-radius: 0;
    opacity: 0.78;
  }
  .playhead {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 1px;
    background: var(--ink);
    opacity: 0.45;
    left: 0;
    transition: left 0.05s linear;
  }

  /* ---- Pad grid ---- */
  .pads {
    flex: 1;
    padding: 4px 16px 8px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 6px;
    min-height: 320px;
  }
  .pad {
    background: var(--pad);
    border-radius: 3px;
    position: relative;
    cursor: pointer;
    transition: background 0.08s ease, transform 0.08s ease;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.25),
      inset 0 -1px 0 rgba(0,0,0,0.06);
  }
  .pad:active,
  .pad.flash {
    background: var(--accent);
    transform: scale(0.985);
  }
  /* Step indicator: small filled square in corner if pad has a programmed step in current position */
  .pad .step-dot {
    position: absolute;
    bottom: 6px;
    right: 6px;
    width: 8px;
    height: 8px;
    background: var(--accent);
    opacity: 0;
  }
  .pad.has-step .step-dot { opacity: 1; }

  /* For the mockup we'll show a couple programmed pads to demo the look */
  .pad.has-step.demo-bright { background: var(--pad-pressed); }

  /* ---- Transport ---- */
  .transport {
    height: 52px;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    align-items: center;
    padding: 0 16px;
    border-top: 1px solid var(--hairline);
  }
  .ctrl {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    cursor: pointer;
  }
  .ctrl svg {
    width: 18px;
    height: 18px;
    stroke: var(--ink-soft);
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .ctrl.play svg {
    fill: var(--ink-soft);
    stroke: var(--ink-soft);
  }
  .ctrl.play.playing svg {
    fill: var(--accent);
    stroke: var(--accent);
  }

  /* ---- Signature ---- */
  .signature {
    text-align: center;
    padding: 8px 0 12px;
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: lowercase;
    color: var(--ink);
    opacity: 0.32;
  }

  /* ---- Loose helpers ---- */
  .spacer { flex: 1; }
</style>
</head>
<body>
  <div class="device">

    <!-- TOP BAR -->
    <div class="topbar">
      <div class="back">
        <svg viewBox="0 0 16 16" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 3 L5 8 L10 13"/>
        </svg>
      </div>
      <div class="kit-name">studio 01</div>
      <div class="bpm">92 bpm</div>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <div class="tab active">pads</div>
      <div class="tab">seq</div>
      <div class="tab">pad fx</div>
      <div class="tab">kit fx</div>
    </div>

    <!-- KNOBS -->
    <div class="knobs">
      <!-- 8 knobs, generated via small JS for crispness -->
      <div class="knob-cell"><div class="knob-label">filter freq</div><div class="knob" data-value="0.62"></div></div>
      <div class="knob-cell"><div class="knob-label">filter reso</div><div class="knob" data-value="0.34"></div></div>
      <div class="knob-cell"><div class="knob-label">transpose</div><div class="knob" data-value="0.50"></div></div>
      <div class="knob-cell"><div class="knob-label">detune</div><div class="knob" data-value="0.50"></div></div>
      <div class="knob-cell"><div class="knob-label">attack</div><div class="knob" data-value="0.05"></div></div>
      <div class="knob-cell"><div class="knob-label">hold</div><div class="knob" data-value="0.42"></div></div>
      <div class="knob-cell"><div class="knob-label">decay</div><div class="knob" data-value="0.58"></div></div>
      <div class="knob-cell"><div class="knob-label">pan</div><div class="knob" data-value="0.50"></div></div>
    </div>

    <!-- VELOCITY STRIP -->
    <div class="velocity" id="velocity">
      <div class="playhead" id="playhead"></div>
      <!-- 16 bars, varied heights for demo -->
    </div>

    <!-- PAD GRID -->
    <div class="pads" id="pads">
      <!-- 16 pads via JS -->
    </div>

    <!-- TRANSPORT -->
    <div class="transport">
      <div class="ctrl">
        <svg viewBox="0 0 24 24"><path d="M9 14 L4 14 L4 9"/><path d="M4 14 C4 8 8 5 12 5 C16 5 20 8 20 13"/></svg>
      </div>
      <div class="ctrl">
        <svg viewBox="0 0 24 24"><path d="M15 14 L20 14 L20 9"/><path d="M20 14 C20 8 16 5 12 5 C8 5 4 8 4 13"/></svg>
      </div>
      <div class="ctrl">
        <svg viewBox="0 0 24 24"><rect x="4" y="4" width="12" height="12" rx="1"/><rect x="8" y="8" width="12" height="12" rx="1"/></svg>
      </div>
      <div class="ctrl">
        <svg viewBox="0 0 24 24">
          <line x1="4" y1="4" x2="20" y2="4"/>
          <line x1="4" y1="9" x2="20" y2="9"/>
          <line x1="4" y1="14" x2="20" y2="14"/>
          <line x1="4" y1="19" x2="20" y2="19"/>
        </svg>
      </div>
      <div class="ctrl"></div>
      <div class="ctrl play" id="playBtn">
        <svg viewBox="0 0 24 24"><path d="M7 5 L19 12 L7 19 Z"/></svg>
      </div>
    </div>

    <!-- SIGNATURE -->
    <div class="signature">klinekraft</div>

  </div>

<script>
  /* ---- Knobs ----
     Each knob is a 52px SVG with:
       - a 270° track arc (from 7:30 to 4:30, clockwise)
       - a filled arc from start up to the value position
       - a tick mark from the center pointing to the current value
  */
  function buildKnob(el) {
    const v = parseFloat(el.dataset.value || "0.5");
    const size = 52;
    const cx = size/2, cy = size/2;
    const r = 20;
    // Sweep from -135° to +135° (270° total). 0 = bottom-left, 1 = bottom-right.
    const startA = (-135) * Math.PI / 180;
    const endA   = ( 135) * Math.PI / 180;
    const valA   = startA + (endA - startA) * v;

    const trackPath = arcPath(cx, cy, r, startA, endA);
    const valPath   = arcPath(cx, cy, r, startA, valA);

    // tick from r-9 to r-2 along valA
    const tx1 = cx + Math.cos(valA) * (r - 9);
    const ty1 = cy + Math.sin(valA) * (r - 9);
    const tx2 = cx + Math.cos(valA) * (r - 2);
    const ty2 = cy + Math.sin(valA) * (r - 2);

    el.innerHTML = `
      <svg viewBox="0 0 ${size} ${size}">
        <path class="track" d="${trackPath}" />
        <path class="arc"   d="${valPath}" />
        <line class="tick" x1="${tx1}" y1="${ty1}" x2="${tx2}" y2="${ty2}" />
      </svg>
      <div class="knob-value">${Math.round(v * 100)}</div>
    `;
  }

  function arcPath(cx, cy, r, a1, a2) {
    const x1 = cx + Math.cos(a1) * r;
    const y1 = cy + Math.sin(a1) * r;
    const x2 = cx + Math.cos(a2) * r;
    const y2 = cy + Math.sin(a2) * r;
    const large = (a2 - a1) > Math.PI ? 1 : 0;
    const sweep = (a2 - a1) >= 0 ? 1 : 0;
    return `M ${x1} ${y1} A ${r} ${r} 0 ${large} ${sweep} ${x2} ${y2}`;
  }

  document.querySelectorAll('.knob').forEach(buildKnob);

  /* ---- Velocity bars ---- */
  const veloEl = document.getElementById('velocity');
  // 16 steps; demo heights for visual richness
  const demoVel = [0.85, 0, 0.4, 0,  0.7, 0, 0.55, 0.3,  0.9, 0, 0.45, 0,  0.65, 0.35, 0.8, 0];
  demoVel.forEach(h => {
    const bar = document.createElement('div');
    bar.className = 'vel-bar';
    if (h > 0) {
      bar.style.height = (h * 80) + '%';
    } else {
      bar.style.opacity = 0;
    }
    veloEl.appendChild(bar);
  });

  /* ---- Pads ---- */
  const padsEl = document.getElementById('pads');
  // visual demo: a few "programmed" steps
  const demoSteps = new Set([3, 7, 9, 12]);
  for (let i = 0; i < 16; i++) {
    const pad = document.createElement('div');
    pad.className = 'pad';
    if (demoSteps.has(i)) pad.classList.add('has-step');
    pad.innerHTML = '<div class="step-dot"></div>';
    pad.addEventListener('pointerdown', () => {
      pad.classList.add('flash');
      setTimeout(() => pad.classList.remove('flash'), 90);
      // light haptic if available
      if (window.navigator.vibrate) window.navigator.vibrate(8);
    });
    padsEl.appendChild(pad);
  }

  /* ---- Play button + playhead demo (visual only) ---- */
  const playBtn = document.getElementById('playBtn');
  const playhead = document.getElementById('playhead');
  let playing = false;
  let phPos = 0;
  let phTimer = null;

  function setPlayIcon(on) {
    playBtn.classList.toggle('playing', on);
    playBtn.querySelector('svg').innerHTML = on
      ? '<rect x="6" y="5" width="5" height="14"/><rect x="13" y="5" width="5" height="14"/>'
      : '<path d="M7 5 L19 12 L7 19 Z"/>';
  }

  playBtn.addEventListener('pointerdown', () => {
    playing = !playing;
    setPlayIcon(playing);
    if (playing) {
      const tickMs = (60000 / 92) / 4; // 16ths at 92 BPM
      phTimer = setInterval(() => {
        phPos = (phPos + 1) % 16;
        const w = veloEl.clientWidth;
        playhead.style.left = (phPos * (w / 16)) + 'px';
      }, tickMs);
    } else {
      clearInterval(phTimer);
      playhead.style.left = '0px';
      phPos = 0;
    }
  });

  /* ---- Tabs (visual only) ---- */
  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('pointerdown', () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
    });
  });
</script>
</body>
</html>
